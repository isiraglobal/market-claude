Pages.patterns=function(el){
  let filterType='all',filterStatus='all',minScore=0,q='';
  function render(){
    let pats=getAllPatterns();
    if(filterType!=='all')pats=pats.filter(p=>p.type===filterType);
    if(minScore>0)pats=pats.filter(p=>p.score>=minScore);
    if(q)pats=pats.filter(p=>p.sym.includes(q.toUpperCase()));
    const typeMap={hammer:'badge-g',doji:'badge-y',engulfing:'badge-b',morning_star:'badge-p'};
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Pattern Analysis</div><div class="page-sub">${pats.length} patterns detected</div></div>
    </div>
    <div style="padding:10px 18px;border-bottom:1px solid var(--b1);background:var(--s1);display:flex;gap:10px;flex-wrap:wrap;align-items:center;flex-shrink:0">
      <input placeholder="Symbol..." oninput="patQ(this.value)" style="font-size:11px;padding:5px 9px;width:130px">
      <select onchange="patType(this.value)" style="font-size:11px;padding:5px 9px">
        <option value="all">All Patterns</option>
        ${['hammer','doji','engulfing','morning_star'].map(t=>`<option value="${t}">${t.replace(/_/g,' ')}</option>`).join('')}
      </select>
      <div style="display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t3)">Min Score:
        <input type="range" min="0" max="100" value="${minScore}" oninput="patScore(+this.value)" style="width:80px">
        <span id="scoreV" style="color:var(--accent);font-weight:700">${minScore}</span>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="patReset()">Reset</button>
    </div>
    <div style="flex:1;overflow:auto">
      ${!pats.length?`<div class="empty"><div class="empty-title">No patterns</div><div class="empty-sub">${S.symbols.length?'Try adjusting filters or sync more data':'Sync data first'}</div></div>`:`
      <div class="tbl-wrap" style="margin:0"><table>
        <thead><tr><th>Symbol</th><th>Pattern</th><th>Detected</th><th>Score</th><th>Strength</th><th>Vol Spike</th></tr></thead>
        <tbody>${pats.map(p=>`<tr onclick="openStock('${p.sym}')" style="cursor:pointer">
          <td class="td-sym">${p.sym}</td>
          <td><span class="badge ${typeMap[p.type]||'badge-n'}">${p.type.replace(/_/g,' ')}</span></td>
          <td style="color:var(--t3);font-size:10px">${p.label||fds(p.ts)}</td>
          <td><span class="${p.score>=70?'up':p.score>=40?'':'dn'}" style="font-weight:700">${p.score}</span></td>
          <td style="width:90px">${sbar(p.score)}</td>
          <td>${p.volSpike?'<span class="up" style="font-weight:700;font-size:10px">Yes</span>':'<span style="color:var(--t3)">—</span>'}</td>
        </tr>`).join('')}
        </tbody>
      </table></div>`}
    </div>`;
    window.patQ=v=>{q=v;render();};
    window.patType=v=>{filterType=v;render();};
    window.patScore=v=>{minScore=v;document.getElementById('scoreV').textContent=v;render();};
    window.patReset=()=>{filterType='all';filterStatus='all';minScore=0;q='';render();};
  }
  render();
};

function getAllPatterns(){
  const out=[];
  for(const sym of S.symbols){
    const sr=series(sym);
    const pr=sr.map(s=>s.prices[sym]).filter(p=>typeof p==='number'&&isFinite(p)&&p>0);
    if(pr.length<3)continue;
    
    for(let i=2;i<pr.length;i++){
      const [a,b,cur]=[pr[i-2],pr[i-1],pr[i]];
      if(!isFinite(a)||!isFinite(b)||!isFinite(cur)||a<=0||b<=0||cur<=0)continue;
      
      const body=Math.abs(cur-b);
      const rng=Math.max(a,b,cur)-Math.min(a,b,cur)||1;
      
      // Hammer: prior high > dip, recovery above dip
      if(a>b&&cur>b&&(cur-b)/(a-b||1)>0.5){
        const score=Math.min(100,Math.round(((cur-b)/(a-b||1))*70));
        if(score>=40)out.push({sym,type:'hammer',ts:sr[i].ts,label:sr[i].label,score,volSpike:score>=60});
      }
      
      // Doji: small body relative to range
      if(body/rng<0.1&&rng>0&&a>b*0.99&&a<b*1.01){
        out.push({sym,type:'doji',ts:sr[i].ts,label:sr[i].label,score:50,volSpike:false});
      }
      
      // Engulfing: large move opposite to prior move
      if(i>=2&&Math.abs(cur-b)>Math.abs(b-a)*1.4&&(cur-b)*(b-a)<0){
        const absSize=(cur-b)/(b-a||1);
        const score=Math.min(100,Math.round(Math.abs(absSize)*65));
        if(score>=50)out.push({sym,type:'engulfing',ts:sr[i].ts,label:sr[i].label,score,volSpike:score>=70});
      }
    }
    
    // Morning star: low, recovery, strong follow-through
    for(let i=3;i<pr.length;i++){
      const [a,b,c,d]=[pr[i-3],pr[i-2],pr[i-1],pr[i]];
      if(!isFinite(a)||!isFinite(b)||!isFinite(c)||!isFinite(d)||a<=0||b<=0||c<=0||d<=0)continue;
      
      if(a>b&&c>b&&d>a*0.98&&d>c&&Math.abs(b-a)/a<0.03){
        out.push({sym,type:'morning_star',ts:sr[i].ts,label:sr[i].label,score:75,volSpike:true});
      }
    }
  }
  return out.sort((a,b)=>b.ts-a.ts).slice(0,100);
}

// ── SCREENER ─────────────────────────────────────────────────────────────────
Pages.screener=function(el){
  let filters={minP:0,maxP:Infinity,minSnaps:0,minRet:-Infinity,maxRet:Infinity,trend:'all',minVol:0,maxVol:Infinity};
  let page=1;
  const pageSize=100;

  function applyFilters(){
    return S.symbols.filter(sym=>{
      const p=latestPrice(sym);const st=stats(sym);const c=change(sym);
      if(!p||!st)return false;
      if(p<filters.minP||p>filters.maxP)return false;
      if(st.count<filters.minSnaps)return false;
      if(st.pct<filters.minRet||st.pct>filters.maxRet)return false;
      if(st.vol<filters.minVol||st.vol>filters.maxVol)return false;
      if(filters.trend==='up'&&(!c||c.pct<=0))return false;
      if(filters.trend==='dn'&&(!c||c.pct>=0))return false;
      return true;
    });
  }
  function render(){
    const res=applyFilters();
    const total = res.length;
    const maxPage = Math.ceil(total / pageSize) || 1;
    if(page > maxPage) page = maxPage;
    if(page < 1) page = 1;
    const startIdx = (page - 1) * pageSize;
    const endIdx = startIdx + pageSize;
    const pageRes = res.slice(startIdx, endIdx);

    el.innerHTML=`
    <div style="display:flex;height:100%;overflow:hidden">
      <div class="sidebar" style="width:240px">
        <div class="sb-hdr"><div class="sb-title">Filters</div>
          <button class="btn btn-sm btn-ghost" onclick="scrReset()" style="width:100%;margin-top:4px">Reset All</button>
        </div>
        <div class="sb-list" style="padding:14px;display:flex;flex-direction:column;gap:12px">
          <div><label class="form-lbl">Price (Rs)</label>
            <div class="form-row">
              <input type="number" id="scr-minP" class="form-inp" placeholder="Min" value="${filters.minP || ''}" oninput="sf('minP',+this.value||0)" style="font-size:11px; width:100%">
              <input type="number" id="scr-maxP" class="form-inp" placeholder="Max" value="${filters.maxP === Infinity ? '' : filters.maxP}" oninput="sf('maxP',+this.value||Infinity)" style="font-size:11px; width:100%">
            </div>
          </div>
          <div><label class="form-lbl">Min Snapshots</label>
            <input type="number" id="scr-minSnaps" class="form-inp" min="0" value="${filters.minSnaps}" oninput="sf('minSnaps',+this.value)" style="width:100%;font-size:11px">
          </div>
          <div><label class="form-lbl">Return % Range</label>
            <div class="form-row">
              <input type="number" id="scr-minRet" class="form-inp" placeholder="Min %" value="${filters.minRet === -Infinity ? '' : filters.minRet}" oninput="sf('minRet',+this.value||-Infinity)" style="font-size:11px; width:100%">
              <input type="number" id="scr-maxRet" class="form-inp" placeholder="Max %" value="${filters.maxRet === Infinity ? '' : filters.maxRet}" oninput="sf('maxRet',+this.value||Infinity)" style="font-size:11px; width:100%">
            </div>
          </div>
          <div><label class="form-lbl">Volatility %</label>
            <div class="form-row">
              <input type="number" id="scr-minVol" class="form-inp" placeholder="Min" value="${filters.minVol || ''}" oninput="sf('minVol',+this.value||0)" style="font-size:11px; width:100%">
              <input type="number" id="scr-maxVol" class="form-inp" placeholder="Max" value="${filters.maxVol === Infinity ? '' : filters.maxVol}" oninput="sf('maxVol',+this.value||Infinity)" style="font-size:11px; width:100%">
            </div>
          </div>
          <div><label class="form-lbl">Trend</label>
            <select id="scr-trend" class="form-inp" onchange="sf('trend',this.value)" style="width:100%;font-size:11px">
              <option value="all" ${filters.trend==='all'?'selected':''}>Any</option>
              <option value="up" ${filters.trend==='up'?'selected':''}>Upward</option>
              <option value="dn" ${filters.trend==='dn'?'selected':''}>Downward</option>
            </select>
          </div>
          <hr style="border-color:var(--b1)">
          <button class="btn btn-primary btn-sm" onclick="scrSave()">Save Screener</button>
          ${S.screeners.length?`<div><div class="sb-title" style="margin-bottom:6px">Saved</div>
            ${S.screeners.map(s=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--b1)">
              <div style="flex:1;font-size:11px;cursor:pointer" onclick="scrLoad('${s.id}')">${s.name}</div>
              <button class="btn btn-sm btn-ghost" onclick="scrDel('${s.id}')">Del</button>
            </div>`).join('')}
          </div>`:''}
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="page-hdr"><div><div class="page-title">Screener Results</div><div class="page-sub">${res.length} stocks match</div></div></div>
        <div style="flex:1;overflow:auto;display:flex;flex-direction:column">
          ${!res.length?`<div class="empty"><div class="empty-title">No matches</div><div class="empty-sub">Relax filters or sync more data</div></div>`:`
          <div class="tbl-wrap" style="margin:0;flex:1;overflow:auto"><table>
            <thead><tr><th>Symbol</th><th>Sparkline</th><th>Price</th><th>Change</th><th>Return %</th><th>Volatility</th><th>Snaps</th><th></th></tr></thead>
            <tbody>${pageRes.map(sym=>{
              const p=latestPrice(sym),c=change(sym),st=stats(sym),cls=cc(c);
              return`<tr onclick="openStock('${sym}')" style="cursor:pointer">
                <td class="td-sym">${sym}</td><td>${spark(sym,56,20)}</td>
                <td class="${cls}" style="font-weight:700;font-family:var(--display)">${fp(p)}</td>
                <td class="${cls}" style="font-weight:700">${c?fc(c,true):'—'}</td>
                <td class="${st&&st.pct>=0?'up':'dn'}">${st?(st.pct>=0?'+':'')+st.pct.toFixed(2)+'%':'—'}</td>
                <td style="color:var(--t3)">${st?st.vol.toFixed(2)+'%':'—'}</td>
                <td style="color:var(--t3)">${st?st.count:'—'}</td>
                <td><button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openStock('${sym}')">View</button></td>
              </tr>`;}).join('')}
            </tbody>
          </table></div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.25);border-top:1px solid rgba(255,255,255,0.3);flex-shrink:0">
            <div style="font-size:11px;color:var(--t2)">Showing ${startIdx + 1}-${Math.min(endIdx, total)} of ${total}</div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-sm btn-ghost" onclick="scrPage(-1)" ${page === 1 ? 'disabled' : ''}>Previous</button>
              <span style="font-size:11px;align-self:center;color:var(--t2)">Page ${page} of ${maxPage}</span>
              <button class="btn btn-sm btn-ghost" onclick="scrPage(1)" ${page === maxPage ? 'disabled' : ''}>Next</button>
            </div>
          </div>
          `}
        </div>
      </div>
    </div>`;
    window.sf=(k,v)=>{
      filters[k]=v;
      page=1;
      const activeId = document.activeElement ? document.activeElement.id : null;
      const start = document.activeElement ? document.activeElement.selectionStart : null;
      const end = document.activeElement ? document.activeElement.selectionEnd : null;
      render();
      if (activeId) {
        const el = document.getElementById(activeId);
        if (el) {
          el.focus();
          if (start !== null && end !== null && typeof el.setSelectionRange === 'function') {
            el.setSelectionRange(start, end);
          }
        }
      }
    };
    window.scrPage=delta=>{page+=delta;render();};
    window.scrReset=()=>{filters={minP:0,maxP:Infinity,minSnaps:0,minRet:-Infinity,maxRet:Infinity,trend:'all',minVol:0,maxVol:Infinity};page=1;render();};
    window.scrSave=()=>showModal('Save Screener',`<div class="form-grp"><label class="form-lbl">Name</label><input class="form-inp" id="scrName" placeholder="e.g. High Momentum"></div>`,
      `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" onclick="doScrSave()">Save</button>`);
    window.doScrSave=async()=>{const n=document.getElementById('scrName')?.value?.trim();if(!n)return;S.screeners.push({id:'scr'+uid(),name:n,filters:{...filters}});await saveUserData();closeModal();toast('Screener saved');render();};
    window.scrLoad=id=>{const s=S.screeners.find(x=>x.id===id);if(s){filters={...filters,...s.filters};page=1;render();}};
    window.scrDel=async id=>{S.screeners=S.screeners.filter(x=>x.id!==id);await saveUserData();render();};
  }
  render();
};

// ── PORTFOLIO ────────────────────────────────────────────────────────────────
Pages.portfolio=function(el){
  function calcPL(e){const cur=latestPrice(e.sym);if(!cur)return null;const inv=e.qty*e.avgBuy;const curV=e.qty*cur;const pl=curV-inv;return{cur,inv,curV,pl,plPct:pl/inv*100};}
  function render(){
    const allPL=S.portfolio.map(e=>({...e,pl:calcPL(e)}));
    const totInv=allPL.reduce((a,e)=>a+(e.pl?.inv||0),0);
    const totCur=allPL.reduce((a,e)=>a+(e.pl?.curV||0),0);
    const totPL=totCur-totInv;
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Portfolio</div><div class="page-sub">${S.portfolio.length} positions</div></div>
      <button class="btn btn-primary" onclick="addPosMdl()">+ Add Position</button>
    </div>
    <div class="page-body">
      ${!S.portfolio.length?`<div class="empty"><div class="empty-title">No positions</div><div class="empty-sub">Add stocks to track unrealised P&L</div><button class="btn btn-primary" style="margin-top:10px" onclick="addPosMdl()">+ Add Position</button></div>`:`
      <div class="kpis" style="margin-bottom:18px">
        <div class="kpi"><div class="kpi-lbl">Invested</div><div class="kpi-val">${totInv>=1e7?'Rs '+(totInv/1e7).toFixed(2)+'Cr':fp(totInv)}</div></div>
        <div class="kpi ${totPL>=0?'ka':'kr'}"><div class="kpi-lbl">Current Value</div><div class="kpi-val ${totPL>=0?'up':'dn'}">${totCur>=1e7?'Rs '+(totCur/1e7).toFixed(2)+'Cr':fp(totCur)}</div></div>
        <div class="kpi ${totPL>=0?'ka':'kr'}"><div class="kpi-lbl">Total P&L</div><div class="kpi-val ${totPL>=0?'up':'dn'}">${fp(totPL)}</div></div>
        <div class="kpi ${totPL>=0?'ka':'kr'}"><div class="kpi-lbl">Return</div><div class="kpi-val ${totPL>=0?'up':'dn'}">${totInv?(totPL>=0?'+':'')+((totPL/totInv)*100).toFixed(2)+'%':'—'}</div></div>
        <div class="kpi"><div class="kpi-lbl">Positions</div><div class="kpi-val">${S.portfolio.length}</div></div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Symbol</th><th>Qty</th><th>Avg Buy</th><th>Current</th><th>Invested</th><th>Value</th><th>P&L</th><th>P&L %</th><th>Date</th><th></th></tr></thead>
        <tbody>${allPL.map(e=>{const cls=e.pl&&e.pl.pl>=0?'up':'dn';return`<tr>
          <td class="td-sym" onclick="openStock('${e.sym}')" style="cursor:pointer">${e.sym}</td>
          <td>${e.qty.toLocaleString()}</td><td>${fp(e.avgBuy)}</td>
          <td class="${cls}">${e.pl?fp(e.pl.cur):'—'}</td>
          <td>${fp(e.qty*e.avgBuy)}</td>
          <td>${e.pl?fp(e.pl.curV):'—'}</td>
          <td class="${cls}" style="font-weight:700">${e.pl?fp(e.pl.pl):'—'}</td>
          <td><span class="badge ${e.pl&&e.pl.plPct>=0?'badge-g':'badge-r'}">${e.pl?(e.pl.plPct>=0?'+':'')+e.pl.plPct.toFixed(2)+'%':'—'}</span></td>
          <td style="font-size:10px;color:var(--t3)">${e.date||'—'}</td>
          <td><button class="btn btn-sm btn-danger" onclick="delPos('${e.id}')">Del</button></td>
        </tr>`;}).join('')}
        </tbody>
      </table></div>`}
    </div>`;
    window.delPos=async id=>{if(!confirm('Remove position?'))return;S.portfolio=S.portfolio.filter(e=>e.id!==id);await saveUserData();render();toast('Position removed');};
  }
  render();
};

window.addToPortfolio=function(sym){
  const p=latestPrice(sym)||0;
  showModal('Add to Portfolio',`
    <div class="form-grp"><label class="form-lbl">Symbol</label>
      <input class="form-inp" id="pfSym" value="${sym}" ${sym?'readonly':''} placeholder="e.g. RELIANCE"></div>
    <div class="form-row">
      <div class="form-grp"><label class="form-lbl">Qty</label><input class="form-inp" id="pfQty" type="number" min="1" value="1" oninput="pfCalc()"></div>
      <div class="form-grp"><label class="form-lbl">Avg Buy (Rs)</label><input class="form-inp" id="pfPrice" type="number" step="0.01" value="${p.toFixed(2)}" oninput="pfCalc()"></div>
    </div>
    <div class="form-grp"><label class="form-lbl">Date</label><input class="form-inp" id="pfDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div style="background:var(--s3);border:1px solid var(--b1);border-radius:var(--r6);padding:10px 12px;font-size:11px;display:flex;justify-content:space-between">
      <span style="color:var(--t3)">Total Invested</span><span id="pfTotal" style="font-weight:700">${fp(p)}</span>
    </div>`,
    `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" onclick="doAddPos()">Add</button>`);
};
window.addPosMdl=()=>window.addToPortfolio('');
window.pfCalc=()=>{const q=+document.getElementById('pfQty')?.value||0;const p=+document.getElementById('pfPrice')?.value||0;const el=document.getElementById('pfTotal');if(el)el.textContent=fp(q*p);};
window.doAddPos=async()=>{
  const sym=(document.getElementById('pfSym')?.value||'').trim().toUpperCase();
  const qty=+document.getElementById('pfQty')?.value;const price=+document.getElementById('pfPrice')?.value;
  const date=document.getElementById('pfDate')?.value;
  if(!sym||!qty||!price)return toast('Fill all required fields','err');
  S.portfolio.push({id:'pf'+uid(),sym,qty,avgBuy:price,date,createdAt:new Date().toISOString()});
  await saveUserData();closeModal();toast(`${sym} added to portfolio`);
  if(S.activePage==='portfolio')nav('portfolio');
};

// ── WATCHLISTS ───────────────────────────────────────────────────────────────

    <div style="display:flex;height:100%;overflow:hidden">

        <div class="sb-hdr"><div class="sb-title">Watchlists</div>
          <button class="btn btn-primary btn-sm" onclick="createWLModal()" style="width:100%;margin-top:4px">+ New List</button>
        </div>
        <div class="sb-list">

          <div class="si${activeWL?.id===wl.id?' active':''}" onclick="selWL('${wl.id}')">
            <div class="si-info"><div class="si-sym">${wl.name}</div><div class="si-chg nu">${cnt} stocks</div></div>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delWL('${wl.id}')">Del</button>

          <button class="btn btn-ghost" onclick="addToWLMdl('${activeWL.id}')">+ Add Stock</button>

          <div class="tbl-wrap" style="margin:0"><table>
            <thead><tr><th>Symbol</th><th>Sparkline</th><th>Price</th><th>Change</th><th>High</th><th>Low</th><th>Added</th><th></th></tr></thead>
            <tbody>${items.map(item=>{

                <td class="${cls}" style="font-weight:700;font-family:var(--display)">${fp(p)}</td>
                <td class="${cls}" style="font-weight:700">${c?fc(c,true):'—'}</td>
                <td class="up">${st?fp(st.hi):'—'}</td><td class="dn">${st?fp(st.lo):'—'}</td>
                <td style="font-size:10px;color:var(--t3)">${item.addedAt?new Date(item.addedAt).toLocaleDateString('en-IN'):'—'}</td>
                <td onclick="event.stopPropagation()"><button class="btn btn-sm btn-danger" onclick="delWLItem('${item.id}')">Del</button></td>
              </tr>`;}).join('')}

          </table></div>`}

      </div>
    </div>`;
    window.selWL=id=>{activeWL=S.watchlists.find(w=>w.id===id);render();};

window.createWLModal=()=>showModal('New Watchlist',`

};

// ── ALERTS ───────────────────────────────────────────────────────────────────
Pages.alerts=function(el){
  function checkAlert(a){const cur=latestPrice(a.sym);if(!cur)return false;return(a.cond==='above'&&cur>=a.target)||(a.cond==='below'&&cur<=a.target);}
  function render(){
    const triggered=S.alerts.filter(a=>a.active&&checkAlert(a));
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Price Alerts</div><div class="page-sub">${S.alerts.filter(a=>a.active).length} active${triggered.length?` · ${triggered.length} triggered`:''}</div></div>
      <button class="btn btn-primary" onclick="createAlertMdl()">+ New Alert</button>
    </div>
    ${triggered.length?`<div style="padding:10px 18px;border-bottom:1px solid rgba(255,46,147,.08);background:rgba(255,46,147,.05);display:flex;gap:10px;flex-wrap:wrap">
      ${triggered.map(a=>`<div style="background:rgba(255,46,147,.1);border:1px solid rgba(255,46,147,.25);border-radius:var(--r8);padding:9px 13px">
        <div style="font-family:var(--display);font-size:13px;font-weight:800;color:var(--accent)">${a.sym}</div>
        <div style="font-size:10px;color:var(--t3)">${a.cond} Rs ${a.target.toFixed(2)}</div>
        <div style="font-size:12px;font-weight:700;color:var(--accent)">${fp(latestPrice(a.sym))}</div>
      </div>`).join('')}
    </div>`:''}
    <div style="flex:1;overflow:auto">
      ${!S.alerts.length?`<div class="empty"><div class="empty-title">No alerts</div><div class="empty-sub">Get notified when stocks cross your target price</div><button class="btn btn-primary" style="margin-top:10px" onclick="createAlertMdl()">+ New Alert</button></div>`:`
      <div class="tbl-wrap" style="margin:0"><table>
        <thead><tr><th>Symbol</th><th>Condition</th><th>Target</th><th>Current</th><th>Distance</th><th>Status</th><th></th></tr></thead>
        <tbody>${S.alerts.map(a=>{
          const cur=latestPrice(a.sym);const trig=checkAlert(a);
          const dist=cur?((cur-a.target)/a.target*100).toFixed(2):null;
          return`<tr>
            <td class="td-sym" onclick="openStock('${a.sym}')" style="cursor:pointer">${a.sym}</td>
            <td style="text-transform:capitalize;color:var(--t3)">${a.cond}</td>
            <td style="font-weight:700">Rs ${a.target.toFixed(2)}</td>
            <td class="${trig?'up':'nu'}">${fp(cur)}</td>
            <td style="font-size:10px">${dist!=null?`<span class="${+dist>=0?'up':'dn'}">${+dist>=0?'+':''}${dist}%</span>`:'—'}</td>
            <td>${trig?'<span class="badge badge-g">Triggered</span>':a.active?'<span class="badge badge-y">Watching</span>':'<span class="badge badge-n">Paused</span>'}</td>
            <td style="display:flex;gap:5px">
              <button class="btn btn-sm btn-ghost" onclick="toggleAlert('${a.id}')">${a.active?'Pause':'Resume'}</button>
              <button class="btn btn-sm btn-danger" onclick="delAlert('${a.id}')">Del</button>
            </td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>`}
    </div>`;
    window.toggleAlert=async id=>{const a=S.alerts.find(x=>x.id===id);if(a){a.active=!a.active;await saveUserData();render();}};
    window.delAlert=async id=>{if(!confirm('Delete alert?'))return;S.alerts=S.alerts.filter(x=>x.id!==id);await saveUserData();render();toast('Alert deleted');};
  }
  render();

// ── Navigation Indicator Physics (Apple Liquid style) ──────────────────────
function updateNavIndicator(pg) {
  const activeBtn = document.querySelector(`.nav-sidebar .nav-icon-btn[data-pg="${pg}"]`);
  const indicator = document.getElementById('nav-indicator');
  if (!activeBtn || !indicator) return;
  
  // Force visible indicator on desktop
  indicator.style.display = 'block';
  
  const rect = activeBtn.getBoundingClientRect();
  const parentRect = activeBtn.parentElement.getBoundingClientRect();
  const targetTop = rect.top - parentRect.top;
  
  const prevTop = parseFloat(indicator.dataset.top);
  if (!isNaN(prevTop) && prevTop !== targetTop) {
    const diff = Math.abs(targetTop - prevTop);
    const stretch = Math.min(25, diff * 0.35);
    
    indicator.style.height = `${46 + stretch}px`;
    if (targetTop > prevTop) {
      indicator.style.transform = `translateY(${targetTop - stretch}px)`;
    } else {
      indicator.style.transform = `translateY(${targetTop}px)`;
    }
    
    setTimeout(() => {
      indicator.style.height = '46px';
      indicator.style.transform = `translateY(${targetTop}px)`;
    }, 220);
  } else {
    indicator.style.transform = `translateY(${targetTop}px)`;
    indicator.style.height = '46px';
  }
  
  indicator.dataset.top = targetTop;
}

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  
  // Update toggle UI state
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    if (newTheme === 'dark') {
      themeToggle.classList.add('on');
    } else {
      themeToggle.classList.remove('on');
    }
  }
}

// ── Interactive Liquid Background Canvas (Rainy, Cloudy Frosted Glass) ─────
function initLiquidBg() {
  const canvas = document.getElementById('liquid-bg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  let width = canvas.width = window.innerWidth / 4;
  let height = canvas.height = window.innerHeight / 4;
  
  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth / 4;
    height = canvas.height = window.innerHeight / 4;
    if (S.activePage) updateNavIndicator(S.activePage);
  });
  
  // Soft, cloudy pastel blobs for light-mode fog & neon glow for dark mode
  const blobs = [
    { x: width * 0.2, y: height * 0.3, r: 120, vx: 0.08, vy: 0.11, getCol: () => document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(255, 255, 255, 0.45)' : 'rgba(10, 15, 30, 0.5)' },
    { x: width * 0.8, y: height * 0.7, r: 155, vx: -0.06, vy: -0.09, getCol: () => document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(255, 180, 200, 0.35)' : 'rgba(0, 150, 255, 0.15)' },
    { x: width * 0.5, y: height * 0.1, r: 105, vx: 0.1, vy: -0.07, getCol: () => document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(240, 210, 255, 0.4)' : 'rgba(142, 36, 170, 0.15)' },
    { x: width * 0.3, y: height * 0.9, r: 135, vx: -0.05, vy: 0.12, getCol: () => document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(255, 220, 230, 0.45)' : 'rgba(0, 220, 255, 0.12)' }
  ];
  
  // Rain streaks setup
  const rain = [];
  const maxRain = 35;
  for (let i = 0; i < maxRain; i++) {
    rain.push({
      x: Math.random() * width,
      y: Math.random() * height,
      len: Math.random() * 12 + 6,
      speed: Math.random() * 2 + 3,
      opacity: Math.random() * 0.15 + 0.05
    });
  }
  
  let mouse = { x: -1000, y: -1000 };
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX / 4;
    mouse.y = e.clientY / 4;
  });
  
  // Dynamic click ripples for liquid repulsion
  let ripples = [];
  window.addEventListener('click', (e) => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    ripples.push({
      x: e.clientX / 4,
      y: e.clientY / 4,
      r: 4,
      maxR: 80,
      opacity: 0.9,
      col: isLight
        ? (Math.random() > 0.5 ? 'rgba(217, 0, 108, 0.25)' : 'rgba(142, 36, 170, 0.25)')
        : (Math.random() > 0.5 ? 'rgba(0, 210, 255, 0.25)' : 'rgba(191, 85, 236, 0.25)')
    });
  });
  
  function animate() {
    // Transparent clearing so background CSS gradient shows through
    ctx.clearRect(0, 0, width, height);
    
    // Draw rain drops first (under blobs for soft depth blur)
    ctx.strokeStyle = document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(217, 0, 108, 0.08)' : 'rgba(0, 210, 255, 0.1)';
    ctx.lineWidth = 0.6;
    ctx.globalCompositeOperation = 'source-over';
    rain.forEach(r => {
      ctx.beginPath();
      ctx.moveTo(r.x, r.y);
      ctx.lineTo(r.x + 0.4, r.y + r.len);
      ctx.stroke();
      
      r.y += r.speed;
      r.x += 0.2; // wind slant
      if (r.y > height) {
        r.y = -r.len;
        r.x = Math.random() * width;
      }
    });
    
    // Process and draw ripples
    ripples.forEach((rip, rIdx) => {
      rip.r += 2.2;
      rip.opacity -= 0.025;
      if (rip.opacity <= 0 || rip.r >= rip.maxR) {
        ripples.splice(rIdx, 1);
        return;
      }
      
      // Repel blobs from ripples
      blobs.forEach(b => {
        const dx = b.x - rip.x;
        const dy = b.y - rip.y;
        const dist = Math.hypot(dx, dy);
        if (dist < rip.r + 50 && dist > 0) {
          const force = (rip.r + 50 - dist) * 0.1;
          b.x += (dx / dist) * force;
          b.y += (dy / dist) * force;
        }
      });
      
      const grad = ctx.createRadialGradient(rip.x, rip.y, 0, rip.x, rip.y, rip.r);
      grad.addColorStop(0, rip.col);
      grad.addColorStop(0.3, rip.col);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      
      ctx.beginPath();
      ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.globalAlpha = rip.opacity;
      ctx.globalCompositeOperation = 'source-over';
      ctx.fill();
      ctx.globalAlpha = 1;
    });
    
    // Process and draw blobs
    blobs.forEach(b => {
      b.x += b.vx;
      b.y += b.vy;
      
      if (b.x - b.r < -100 || b.x + b.r > width + 100) b.vx *= -1;
      if (b.y - b.r < -100 || b.y + b.r > height + 100) b.vy *= -1;
      
      // Mouse repulsion
      const dx = b.x - mouse.x;
      const dy = b.y - mouse.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 130) {
        const force = (130 - dist) * 0.02;
        b.x += (dx / dist) * force;
        b.y += (dy / dist) * force;
      }
      
      const col = b.getCol();
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      grad.addColorStop(0, col);
      grad.addColorStop(0.15, col);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.globalCompositeOperation = 'source-over';
      ctx.fill();
    });
    
    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(animate);
  }
  animate();
}

function generateMockData() {
  const syms = ['RELIANCE', 'TCS', 'INFOSYS', 'HDFCBANK', 'ICICIBANK', 'SBIN', 'BHARTIARTL', 'ITC', 'LT', 'HINDUNILVR', 'KOTAKBANK', 'WIPRO'];
  const basePrices = {
    RELIANCE: 2450.50,
    TCS: 3350.20,
    INFOSYS: 1420.80,
    HDFCBANK: 1610.15,
    ICICIBANK: 920.40,
    SBIN: 580.60,
    BHARTIARTL: 840.10,
    ITC: 430.75,
    LT: 2850.00,
    HINDUNILVR: 2520.30,
    KOTAKBANK: 1840.90,
    WIPRO: 395.25
  };
  
  const snapshots = [];
  const startTs = Date.now() - 20 * 24 * 3600 * 1000; // 20 days ago
  
  for (let i = 0; i < 20; i++) {
    const ts = startTs + i * 24 * 3600 * 1000;
    const date = new Date(ts);
    const label = date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    const prices = {};
    
    syms.forEach(sym => {
      const base = basePrices[sym];
      // Deterministic pseudo-random walk
      let changePercent = (Math.sin(i * 0.6 + sym.charCodeAt(0)) * 1.6) + (Math.cos(i * 0.9) * 0.9);
      if (sym === 'SBIN' && i > 12) changePercent += 1.8; // SBIN hammer signal
      if (sym === 'RELIANCE') changePercent += 0.6; // Upward trend
      if (sym === 'TCS' && i === 18) changePercent -= 3.5; // Engulfing trigger
      if (sym === 'TCS' && i === 19) changePercent += 4.5; // Engulfing confirmation
      
      const price = base * (1 + (changePercent * i * 0.006));
      prices[sym] = parseFloat(price.toFixed(2));
    });
    
    snapshots.push({
      ts,
      label,
      prices
    });
  }
  
  const portfolio = [
    { id: 'pf-mock1', sym: 'RELIANCE', qty: 50, avgBuy: 2400.00, date: new Date(startTs).toISOString().slice(0,10) },
    { id: 'pf-mock2', sym: 'INFOSYS', qty: 120, avgBuy: 1450.00, date: new Date(startTs + 2*24*3600*1000).toISOString().slice(0,10) }
  ];
  
  const watchlists = [
    { id: 'wl-mock1', name: 'Nifty Heavyweights', desc: 'Core market leaders', createdAt: new Date().toISOString() }
  ];
  
  const watchlistItems = [
    { id: 'wli-mock1', wlId: 'wl-mock1', sym: 'RELIANCE', addedAt: new Date().toISOString() },
    { id: 'wli-mock2', wlId: 'wl-mock1', sym: 'TCS', addedAt: new Date().toISOString() },
    { id: 'wli-mock3', wlId: 'wl-mock1', sym: 'HDFCBANK', addedAt: new Date().toISOString() }
  ];
  
  const alerts = [
    { id: 'al-mock1', sym: 'RELIANCE', cond: 'above', target: 2600.00, active: true, createdAt: new Date().toISOString() }
  ];
  
  return {
    snapshots,
    symbols: syms,
    lastSync: Date.now(),
    portfolio,
    watchlists,
    watchlistItems,
    alerts,
    screeners: []
  };
}

(async()=>{
  setLoad(20);
  if (typeof initLiquidBg === 'function') initLiquidBg();

  // Set theme toggle button state on boot
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    if (currentTheme === 'dark') {
      themeToggle.classList.add('on');
    } else {
      themeToggle.classList.remove('on');
    }
  }

  const sidebarCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
  if (sidebarCollapsed) {
    const body = document.querySelector('.body');
    if (body) body.classList.add('sidebar-collapsed');
    const icon = document.getElementById('sidebarToggleIcon');
    if (icon) icon.style.transform = 'rotate(180deg)';
  }

  // 1. Try to load from localStorage cache first (Stale-While-Revalidate)
  let hasCache = false;
  try {
    const cached = localStorage.getItem('marketai_cache');
    if (cached) {
      const parsed = JSON.parse(cached);
      if (parsed.symbols && parsed.symbols.length > 0) {
        mergeData(parsed);
        hasCache = true;
        setLoad(40);
        if (S.lastSync) setSyncState('ok', `Cached · ${S.snapshots.length} snaps · ${fago(S.lastSync)}`);
        renderTicker();
        renderSidebar();
        nav('dashboard');
      }
    }
  } catch (e) {
    console.warn('Error loading cache:', e);
  }

  // 2. Fetch fresh data from API in background
  try {
    const d = await fetchData();
    mergeData(d);
    setLoad(80);
    if (S.lastSync) setSyncState('ok', `Loaded · ${S.snapshots.length} snaps · ${fago(S.lastSync)}`);
    renderTicker();
    renderSidebar();

    if (!hasCache) {
      nav('dashboard');
    } else {
      renderAll();
    }
    setLoad(100);
    setTimeout(() => setLoad(0), 600);

    // Auto-sync on open if stale (>10 min) or no data
    const stale = !S.lastSync || Date.now() - S.lastSync > 10 * 60 * 1000;
    if (stale) {
      setTimeout(() => doSync(S.snapshots.length > 0), 1200);
    }
  } catch (e) {
    console.error('Error fetching fresh data:', e);
    if (!hasCache) {
      const mockData = generateMockData();
      mergeData(mockData);
      setSyncState('ok', `Demo Mode · Offline Fallback`);
      renderTicker();
      renderSidebar();
      nav('dashboard');
      toast('Demo mode: loaded fallback market data', 'ok');
    } else {
      setSyncState('ok', `Offline/Cached · ${fago(S.lastSync)}`);
      toast('Fresh data fetch failed: ' + e.message, 'err');
    }
    setLoad(0);
  }
})();
</script>
