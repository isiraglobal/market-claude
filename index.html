<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketAI — NSE Intelligence Terminal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0e1a'/><path d='M6 22 L12 16 L18 20 L26 10' stroke='%2300d2ff' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='26' cy='10' r='3' fill='%2300d2ff'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ──────────────────────────────────────────────────────── */
:root {
  /* Default Black & Electric Blue theme */
  --bg: #030407; /* Dark black-blue background */
  --s1: rgba(10, 12, 22, 0.45); /* Frosted transparent dark glass */
  --s2: rgba(15, 20, 35, 0.75); /* Semi-solid frosted dark glass */
  --s3: rgba(0, 150, 255, 0.08); /* Soft electric blue highlight */
  --b1: rgba(255, 255, 255, 0.08); /* Dark glass borders */
  --b2: rgba(0, 150, 255, 0.15); /* Translucent electric blue borders */
  --b3: rgba(255, 255, 255, 0.15); /* Solid glass borders */
  --accent: #00d2ff; /* Vibrant neon electric blue */
  --accent-dim: #0088cc;
  --accent-glow: rgba(0, 210, 255, 0.15);
  --blue: #0066ff;
  --red: #ff3366;
  --green: #00e5a0;
  --yellow: #ffcc00;
  --orange: #ff9900;
  --purple: #bf55ec;
  --t1: #f1f3f9; /* Premium ice white text */
  --t2: #a5b4fc; /* Cool secondary blue-gray text */
  --t3: #64748b; /* Muted slate details */
  --mono: 'Inter', sans-serif;
  --display: 'Inter', sans-serif;
  --r4: 8px;
  --r6: 12px;
  --r8: 20px;
  --r12: 28px;
  --bg-gradient: linear-gradient(135deg, #05070f 0%, #091026 50%, #030408 100%);
  --modal-bg: rgba(0, 0, 0, 0.55);
  --sync-btn-txt: #030407;
  --btn-grad: linear-gradient(135deg, #00d2ff 0%, #0066ff 100%);
  --btn-grad-hover: linear-gradient(135deg, #00e1ff 0%, #0077ff 100%);
}

html[data-theme="light"] {
  /* Pink & White light theme */
  --bg: #ffffff; /* White background */
  --s1: rgba(255, 255, 255, 0.35); /* Frosted transparent white glass */
  --s2: rgba(255, 255, 255, 0.6); /* Semi-solid frosted white glass */
  --s3: rgba(255, 180, 200, 0.15); /* Soft pink highlight */
  --b1: rgba(255, 255, 255, 0.5); /* Glass borders */
  --b2: rgba(255, 180, 200, 0.3); /* Translucent pinkish-white borders */
  --b3: rgba(255, 255, 255, 0.75); /* Highly solid glass borders */
  --accent: #d9006c; /* Vibrant deep pink */
  --accent-dim: #a60053;
  --accent-glow: rgba(217, 0, 108, 0.12);
  --blue: #2242cc;
  --red: #c91e3e;
  --green: #00805c;
  --yellow: #a87b00;
  --orange: #bf5600;
  --purple: #8e24aa;
  --t1: #2d1e2f; /* Premium dark plum text */
  --t2: #5c4d5d; /* Medium secondary plum-gray */
  --t3: #8e7f90; /* Muted details */
  --bg-gradient: linear-gradient(135deg, #fff2f6 0%, #f6edf6 45%, #eef0fa 100%);
  --modal-bg: rgba(255, 240, 245, 0.45);
  --sync-btn-txt: #ffffff;
  --btn-grad: linear-gradient(135deg, var(--accent) 0%, #ff4d6d 100%);
  --btn-grad-hover: linear-gradient(135deg, #ff3399 0%, #ff668f 100%);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--t1);
  font-family: var(--display);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  position: relative;
}
/* Premium grain texture overlay for frosted tactile glass */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  opacity: 0.045; /* Enhanced grain matching user request */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}
a { color: var(--accent); text-decoration: none; }
input, select, textarea {
  font-family: var(--display);
  font-size: 12px;
  background: var(--s1);
  color: var(--t1);
  border: 1px solid var(--b1);
  border-top: 1px solid var(--b3);
  border-left: 1px solid var(--b3);
  border-radius: var(--r6);
  padding: 7px 11px;
  outline: none;
  backdrop-filter: blur(25px);
  box-shadow: inset 0 1px 0 var(--b1), 0 4px 12px var(--accent-glow);
  transition: border-color .15s, box-shadow .15s, background-color .15s;
}
input:focus, select:focus, textarea:focus {
  background: var(--s2);
  border-color: var(--accent);
  box-shadow: inset 0 1px 0 var(--b1), 0 0 14px var(--accent-glow);
}
input::placeholder, textarea::placeholder { color: var(--t3); }
select option { background: var(--bg); color: var(--t1); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--s1); backdrop-filter: blur(10px); }
::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 4px; border: 1px solid var(--b1); }
::-webkit-scrollbar-thumb:hover { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

.up { color: var(--green); font-weight: 600; }
.dn { color: var(--red); font-weight: 600; }
.nu { color: var(--t3); }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

/* ── LIQUID CANVAS BG ───────────────────────────────────────────────────── */
#liquid-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
  filter: url(#gooey) blur(35px);
  pointer-events: none;
  background: var(--bg-gradient);
}

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  position: relative;
  z-index: 2;
  background: transparent;
}

.app-layout {
  display: flex;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* ── DESKTOP SIDEBAR NAVIGATION ─────────────────────────────────────────── */
.nav-sidebar {
  width: 76px;
  background: var(--s1);
  backdrop-filter: blur(45px) saturate(180%);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0;
  z-index: 110;
  flex-shrink: 0;
  position: relative;
}

.nav-logo {
  color: var(--accent);
  margin-bottom: 36px;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  filter: drop-shadow(0 0 10px var(--accent-glow));
  transition: transform 0.3s;
}
.nav-logo:hover {
  transform: scale(1.08) rotate(5deg);
}
.logo-icon {
  width: 28px;
  height: 28px;
}

.nav-icons-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  align-items: center;
  position: relative;
}
.nav-icon-btn {
  width: 46px;
  height: 46px;
  border-radius: var(--r8);
  border: none;
  background: transparent;
  color: var(--t3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.3s;
  position: relative;
  z-index: 2;
}
.nav-icon {
  width: 20px;
  height: 20px;
  transition: transform 0.2s;
}
.nav-icon-btn:hover {
  color: var(--t1);
}
.nav-icon-btn.active {
  color: var(--accent);
}
.nav-indicator {
  position: absolute;
  left: 15px;
  width: 46px;
  height: 46px;
  border-radius: var(--r8);
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  box-shadow: 0 4px 12px var(--accent-glow);
  transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
  z-index: 1;
  transform-origin: center;
}

.nav-profile {
  margin-top: auto;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.nav-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: var(--display);
  font-weight: 800;
  font-size: 14px;
  border: 2px solid var(--b1);
  box-shadow: 0 4px 12px var(--accent-glow);
  transition: transform 0.2s;
}
.nav-avatar:hover {
  transform: scale(1.08);
}

.app-content-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 10;
}

/* ── INTERFACES & PANELS ────────────────────────────────────────────────── */
.topbar {
  height: 52px;
  background: var(--s2);
  backdrop-filter: blur(40px) saturate(160%);
  border-bottom: 1px solid var(--b1);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  flex-shrink: 0;
  z-index: 100;
}
.logo {
  font-family: var(--display);
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  color: var(--t1);
  text-shadow: 0 0 10px var(--accent-glow);
}
.logo-dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px var(--accent);
}
.mainnav { display: none !important; }

.hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t3); flex-shrink: 0; transition: background-color 0.3s; }
.sync-dot.ok { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.sync-dot.err { background: var(--t3); box-shadow: none; }
.sync-dot.spin { background: var(--accent); animation: pulse .8s infinite; box-shadow: 0 0 8px var(--accent); }
.sync-lbl { font-size: 10px; color: var(--t3); white-space: nowrap; }

#syncBtn {
  padding: 5px 13px;
  font-size: 10px;
  border-radius: var(--r4);
  border: none;
  background: var(--accent);
  color: var(--sync-btn-txt);
  font-family: var(--mono);
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .3px;
  text-transform: uppercase;
  box-shadow: 0 2px 10px var(--accent-glow);
  transition: all .2s;
}
#syncBtn:hover {
  background: var(--accent-dim);
  transform: translateY(-1px);
  box-shadow: 0 4px 15px var(--accent-glow);
}
#syncBtn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.topbar select { font-size: 11px; padding: 4px 8px; background: var(--s1); border-color: var(--b1); color: var(--t1); }
.loadbar { height: 2px; background: var(--accent); position: fixed; top: 0; left: 0; z-index: 999; transition: width .3s; box-shadow: 0 0 10px var(--accent); }

#ticker {
  height: 30px;
  background: var(--s1);
  backdrop-filter: blur(30px) saturate(160%);
  border-bottom: 1px solid var(--b1);
  overflow: hidden;
  display: none;
  flex-shrink: 0;
}
.ticker-inner { display: flex; white-space: nowrap; animation: ticker 60s linear infinite; height: 100%; align-items: center; }
.ticker-inner:hover { animation-play-state: paused; }
.ti { padding: 0 16px; font-size: 10px; border-right: 1px solid var(--b1); height: 100%; display: flex; align-items: center; gap: 6px; }
.ti-sym { font-family: var(--display); font-weight: 700; font-size: 10px; color: var(--t2); }
 
.body {
  display: grid;
  grid-template-columns: 220px 1fr;
  flex: 1;
  overflow: hidden;
  min-height: 0;
  background: transparent;
  transition: grid-template-columns 0.3s cubic-bezier(0.19, 1, 0.22, 1);
}
.body.sidebar-collapsed {
  grid-template-columns: 0px 1fr;
}
.sidebar {
  background: var(--s1);
  backdrop-filter: blur(45px) saturate(180%);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: opacity 0.3s cubic-bezier(0.19, 1, 0.22, 1), visibility 0.3s cubic-bezier(0.19, 1, 0.22, 1);
}
.body.sidebar-collapsed .sidebar {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.sb-hdr { padding: 12px 14px; border-bottom: 1px solid var(--b1); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.sb-title { font-size: 9px; color: var(--t3); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
.sb-tabs {
  display: flex;
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 30px;
  padding: 3px;
  gap: 0;
}
.sb-tab {
  flex: 1;
  padding: 6px 12px;
  font-size: 10px;
  border-radius: 30px;
  border: none;
  background: transparent;
  color: var(--t2);
  font-family: var(--display);
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}
.sb-tab.active {
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 30px;
  font-weight: 700;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.sb-list { flex: 1; overflow-y: auto; }
.si {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--b1);
  cursor: pointer;
  transition: background .15s, border-left .15s;
  border-left: 2px solid transparent;
}
.si:hover { background: var(--s1); }
.si.active {
  background: var(--accent-glow);
  border-left: 2px solid var(--accent);
}
.si-info { flex: 1; min-width: 0; }
.si-sym { font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--t1); }
.si-chg { font-size: 9px; margin-top: 1px; }
.si-price { font-size: 11px; font-weight: 700; text-align: right; flex-shrink: 0; }
.main { overflow: hidden; display: flex; flex-direction: column; background: transparent; }
#pageArea { flex: 1; overflow: hidden; animation: fadeUp .3s cubic-bezier(0.19, 1, 0.22, 1); }
 
/* ── GLASS COMPONENTS ───────────────────────────────────────────────────── */
.card {
  position: relative;
  background: var(--s1);
  backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--b1);
  border-radius: var(--r8);
  padding: 16px;
  box-shadow: 0 10px 30px var(--accent-glow), inset 0 1px 0 var(--b1);
  transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.25s, box-shadow 0.25s;
  overflow: hidden;
}
.card-sm { padding: 12px; }
.card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; position: relative; z-index: 2; }
.card-title { font-size: 10px; color: var(--t2); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; text-shadow: 0 0 8px rgba(255, 255, 255, 0.1); }
 
/* Glass sheen reflection effect */
.card::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(
    135deg,
    rgba(255, 255, 255, 0) 30%,
    rgba(255, 255, 255, 0.01) 38%,
    rgba(255, 255, 255, 0.04) 45%,
    rgba(255, 255, 255, 0.08) 50%,
    rgba(255, 255, 255, 0.04) 55%,
    rgba(255, 255, 255, 0.01) 62%,
    rgba(255, 255, 255, 0) 70%
  );
  transform: rotate(-45deg);
  transition: transform 0.75s ease-out;
  pointer-events: none;
  z-index: 1;
}
.card:hover {
  transform: translateY(-2px);
  border-color: rgba(255, 0, 127, 0.35);
  box-shadow: 0 14px 40px rgba(217, 0, 108, 0.08);
}
.card:hover::after {
  transform: translate(50%, 50%) rotate(-45deg);
}

.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: .4px; }
.badge-g { background: rgba(0, 245, 180, 0.1); color: var(--green); border: 1px solid rgba(0, 245, 180, 0.18); backdrop-filter: blur(10px); }
.badge-r { background: rgba(255, 77, 109, 0.1); color: var(--red); border: 1px solid rgba(255, 77, 109, 0.18); backdrop-filter: blur(10px); }
.badge-y { background: rgba(245, 193, 78, 0.1); color: var(--yellow); border: 1px solid rgba(245, 193, 78, 0.18); backdrop-filter: blur(10px); }
.badge-b { background: rgba(82, 113, 255, 0.1); color: var(--blue); border: 1px solid rgba(82, 113, 255, 0.18); backdrop-filter: blur(10px); }
.badge-p { background: rgba(217, 70, 239, 0.1); color: var(--purple); border: 1px solid rgba(217, 70, 239, 0.18); backdrop-filter: blur(10px); }
.badge-n { background: rgba(255, 255, 255, 0.03); color: var(--t3); border: 1px solid rgba(255, 255, 255, 0.05); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: var(--r6);
  border: 1px solid transparent;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn-sm { padding: 5px 10px; font-size: 9px; }
.btn-primary {
  background: var(--btn-grad);
  color: var(--sync-btn-txt, #fff);
  border: 1px solid var(--b1);
  border-top: 1px solid var(--b3);
  box-shadow: 0 4px 15px var(--accent-glow);
}
.btn-primary:hover {
  background: var(--btn-grad-hover);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px var(--accent-glow);
}
.btn-ghost {
  background: var(--s1);
  border: 1px solid var(--b1);
  border-top: 1px solid var(--b3);
  color: var(--t2);
  backdrop-filter: blur(10px);
}
.btn-ghost:hover {
  border-color: var(--accent);
  color: var(--sync-btn-txt, #fff);
  background: var(--accent);
  box-shadow: 0 4px 12px var(--accent-glow);
}
.btn-danger {
  background: rgba(255, 77, 109, 0.08);
  border: 1px solid rgba(255, 77, 109, 0.18);
  border-top: 1px solid rgba(255, 77, 109, 0.3);
  color: var(--red);
  backdrop-filter: blur(10px);
}
.btn-danger:hover {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 12px rgba(201, 30, 62, 0.25);
}

.tbl-wrap {
  overflow: auto;
  border: 1px solid var(--b1);
  border-top: 1px solid var(--b3);
  border-left: 1px solid var(--b3);
  border-radius: var(--r8);
  background: var(--s1);
  backdrop-filter: blur(35px) saturate(180%);
  box-shadow: 0 8px 32px 0 var(--accent-glow);
}
table { width: 100%; border-collapse: collapse; font-size: 11px; }
thead th {
  padding: 10px 12px;
  text-align: left;
  color: var(--t2);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  background: var(--s2);
  border-bottom: 1px solid var(--b1);
  white-space: nowrap;
}
tbody td { padding: 9px 12px; border-bottom: 1px solid var(--b1); color: var(--t2); }
tbody tr:hover td { background: var(--accent-glow); color: var(--accent); }
tbody tr:last-child td { border-bottom: none; }
.td-sym { font-family: var(--display); font-weight: 700; color: var(--t1); font-size: 12px; }

.sbar { display: flex; align-items: center; gap: 5px; }
.sbar-track { flex: 1; height: 3px; background: var(--b1); border-radius: 3px; overflow: hidden; min-width: 40px; }
.sbar-fill { height: 100%; border-radius: 3px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grp { margin-bottom: 12px; }
.form-lbl { font-size: 9px; color: var(--t3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; display: block; }
.form-inp { width: 100%; }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 50px 20px; color: var(--t3); text-align: center; }
.empty-icon { font-size: 36px; opacity: .2; }
.empty-title { font-family: var(--display); font-size: 15px; font-weight: 700; color: var(--t3); }
.empty-sub { font-size: 11px; color: var(--t3); max-width: 260px; line-height: 1.6; }

.modal {

.modal-title { font-family: var(--display); font-size: 15px; font-weight: 800; color: var(--t1); }
.modal-close { background: none; border: none; color: var(--t3); font-size: 18px; cursor: pointer; line-height: 1; }

.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--b1); }
 
.toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  background: var(--s2);

  transition: all .25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: auto;
  color: var(--t1);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-color: rgba(0, 245, 180, 0.3); }
.toast.err { border-color: rgba(255, 77, 109, 0.3); }

.info-rows .ir { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--b1); font-size: 11px; }
.info-rows .ir:last-child { border-bottom: none; }
.ir-key { color: var(--t3); }
.ir-val { font-weight: 700; color: var(--t1); }

.page-hdr {
  padding: 16px 20px;
  border-bottom: 1px solid var(--b1);
  background: var(--s1);

  -webkit-backdrop-filter: blur(15px);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;

.page-title { font-family: var(--display); font-size: 18px; font-weight: 800; letter-spacing: -.3px; color: var(--t1); }
.page-sub { font-size: 10px; color: var(--t3); margin-top: 2px; }
.page-body { flex: 1; overflow: auto; padding: 18px 20px; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

.kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.kpi {
  background: var(--s1);

  -webkit-backdrop-filter: blur(20px);

  position: relative;

  box-shadow: 0 10px 30px var(--accent-glow);
}
.kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.kpi.ka::before { background: var(--accent); }
.kpi.kr::before { background: var(--red); }
.kpi.kb::before { background: var(--blue); }
.kpi.ky::before { background: var(--yellow); }
.kpi-lbl { font-size: 9px; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.kpi-val { font-family: var(--display); font-size: 20px; font-weight: 800; letter-spacing: -1px; color: var(--t1); }
.kpi-sub { font-size: 9px; color: var(--t3); margin-top: 3px; }

.sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.sec-title { font-family: var(--display); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; color: var(--t1); }
.sec-line { flex: 1; height: 1px; background: var(--b1); }
.sec-count { font-size: 9px; color: var(--t3); background: var(--s1); border: 1px solid var(--b1); padding: 2px 7px; border-radius: 10px; white-space: nowrap; }

.chart-outer { position: relative; border: 1px solid var(--b1); border-radius: var(--r8); overflow: hidden; background: var(--s1); backdrop-filter: blur(10px); }
.chart-tip { position: absolute; display: none; background: var(--s2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--b3); border-radius: var(--r6); padding: 8px 12px; pointer-events: none; z-index: 20; min-width: 110px; box-shadow: 0 8px 24px var(--accent-glow); }
.period-row {
  display: flex;
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 30px;
  padding: 3px;
  gap: 0;
}
.prd {
  padding: 4px 12px;
  border-radius: 30px;
  border: none;
  background: transparent;
  color: var(--t2);
  font-family: var(--display);
  font-weight: 600;
  font-size: 10px;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}
.prd.active, .prd:hover {
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 30px;
  font-weight: 700;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.sparksvg { display: block; flex-shrink: 0; filter: drop-shadow(0 0 4px currentColor); }

.pick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 10px; }
.pick-card {
  background: var(--s1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--b1);
  border-radius: var(--r8);
  padding: 13px;
  cursor: pointer;
  transition: all .2s;
  border-left: 3px solid var(--b1);
  box-shadow: 0 10px 30px var(--accent-glow);
}
.pick-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 14px 40px var(--accent-glow);
}
.pick-card.up-pick { border-left-color: var(--green); }
.pick-card.dn-pick { border-left-color: var(--red); }
.pick-sym { font-family: var(--display); font-size: 13px; font-weight: 800; color: var(--t1); }
.pick-score { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; background: var(--s1); border: 1px solid var(--b1); color: var(--accent); }
.pick-price { font-family: var(--display); font-size: 17px; font-weight: 800; letter-spacing: -.5px; margin-top: 5px; color: var(--t1); }
.pick-chg { font-size: 10px; font-weight: 700; margin-top: 1px; }
.pick-reason { font-size: 9px; color: var(--t3); margin-top: 5px; line-height: 1.5; }

.gl-row { display: flex; align-items: center; gap: 8px; padding: 7px 6px; border-bottom: 1px solid var(--b1); cursor: pointer; border-radius: var(--r4); transition: background .15s; }
.gl-row:hover { background: var(--s1); }
.gl-row:last-child { border-bottom: none; }

.mkt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.mkt-card { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r8); padding: 12px 14px; cursor: pointer; transition: all .15s; position: relative; overflow: hidden; }
.mkt-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.mkt-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--b1); }
.mkt-card.up::after { background: var(--green); }
.mkt-card.dn::after { background: var(--red); }
.mkt-sym { font-family: var(--display); font-size: 12px; font-weight: 800; color: var(--t1); }
.mkt-price { font-family: var(--display); font-size: 16px; font-weight: 700; margin-top: 5px; color: var(--t1); }
.mkt-chg { font-size: 10px; font-weight: 700; margin-top: 1px; }
.mkt-spark { position: absolute; bottom: 10px; right: 10px; opacity: .3; }

.detail-hdr { background: var(--s2); border-bottom: 1px solid var(--b1); padding: 15px 20px; display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; flex-shrink: 0; }
.detail-sym { font-family: var(--display); font-size: 22px; font-weight: 800; letter-spacing: -.5px; color: var(--t1); }
.detail-meta { display: flex; gap: 7px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
.meta-tag { font-size: 9px; padding: 2px 7px; border-radius: var(--r4); background: var(--s1); border: 1px solid var(--b1); color: var(--t3); letter-spacing: .4px; text-transform: uppercase; }
.detail-price { text-align: right; color: var(--t1); }
.dp-main { font-family: var(--display); font-size: 26px; font-weight: 800; letter-spacing: -1px; }
.dp-chg { font-size: 12px; font-weight: 700; margin-top: 3px; }

.detail-body { display: grid; grid-template-columns: 1fr 240px; flex: 1; overflow: hidden; min-height: 0; }
.detail-left { overflow: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 18px; }
.detail-right { border-left: 1px solid var(--b1); overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; background: var(--s1); }

.mini-stat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.ms { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r6); padding: 9px 11px; }
.ms-lbl { font-size: 9px; color: var(--t3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.ms-val { font-family: var(--display); font-size: 14px; font-weight: 800; color: var(--t1); }

.ai-box { background: var(--accent-glow); border: 1px solid var(--accent); border-radius: var(--r8); padding: 12px 14px; font-size: 11px; color: var(--t2); line-height: 1.7; min-height: 60px; box-shadow: inset 0 0 10px var(--accent-glow); }
.ai-spinner { display: inline-flex; align-items: center; gap: 8px; color: var(--t3); font-size: 10px; }
.spin-ring { width: 14px; height: 14px; border: 2px solid var(--b1); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }

.ws-bar { display: flex; gap: 4px; overflow-x: auto; padding: 8px 16px; border-bottom: 1px solid var(--b1); background: var(--s1); flex-shrink: 0; }
.ws-tab {
  padding: 4px 12px;
  border-radius: var(--r4);
  font-size: 10px;
  color: var(--t3);
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid transparent;
  font-family: var(--mono);
  background: transparent;
  transition: all .15s;
}
.ws-tab:hover { background: var(--s2); color: var(--t1); }
.ws-tab.active {
  background: var(--accent-glow);
  color: var(--accent);
  border-color: var(--accent);
  font-weight: 700;
  box-shadow: 0 0 8px var(--accent-glow);
}

.toggle {
  width: 30px;
  height: 16px;
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 16px;
  position: relative;
  transition: all .2s;
  cursor: pointer;
  flex-shrink: 0;
}
.toggle::after {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  background: var(--t2);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform .2s, background-color .2s;
}
.toggle.on {
  background: var(--accent-glow);
  border-color: var(--accent);
}
.toggle.on::after {
  transform: translateX(14px);
  background: var(--accent);
}
/* Active states for theme icons */
html:not([data-theme="light"]) #themeToggleIconDark { color: var(--accent) !important; }
html[data-theme="light"] #themeToggleIconLight { color: var(--accent) !important; }

/* ── MOBILE NAV BAR ──────────────────────────────────────────────────────── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--s2);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-top: 1px solid var(--b1);
  grid-template-columns: repeat(5, 1fr);
  z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.m-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--t3);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  cursor: pointer;
  gap: 3px;
  transition: color 0.15s;
}
.m-nav-item:hover { color: var(--t1); }
.m-nav-item.active { color: var(--accent); font-weight: 700; text-shadow: 0 0 5px var(--accent-glow); }
.m-nav-icon { width: 18px; height: 18px; }

/* ── MORE PAGE GRID ──────────────────────────────────────────────────────── */
.more-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.more-card {
  background: var(--s1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--b1);
  border-radius: var(--r8);
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 10px 30px var(--accent-glow);
}
.more-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  background: var(--accent-glow);
  box-shadow: 0 14px 40px var(--accent-glow);
}
.more-card-icon { font-size: 20px; background: var(--s2); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: var(--r8); border: 1px solid var(--b1); flex-shrink: 0; }
.more-card-info { min-width: 0; }
.more-card-title { font-family: var(--display); font-size: 12px; font-weight: 800; color: var(--t1); margin-bottom: 2px; }
.more-card-desc { font-size: 10px; color: var(--t3); line-height: 1.4; }

/* ── RESPONSIVE STYLING ─────────────────────────────────────────────────── */
@media(max-width:900px) {
  .body { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .kpis { grid-template-columns: repeat(3, 1fr); }
  .mini-stat-grid { grid-template-columns: repeat(3, 1fr); }
  .detail-body { grid-template-columns: 1fr; }
  .detail-right { display: none; }
  .mobile-nav { display: grid; }
  #app {
    position: relative;
    top: auto;
    left: auto;
    transform: none;
    width: 100vw;
    height: 100vh;
    min-width: 0;
    min-height: 0;
    border-radius: 0;
    border: none;
    box-shadow: none;
    padding-bottom: 56px;
  }
  .nav-sidebar { display: none; }
  .app-layout { flex-direction: column; }
  .body.show-sidebar-on-mobile .sidebar { display: flex !important; width: 100% !important; height: 100% !important; }
  .body.show-sidebar-on-mobile .main { display: none !important; }
}
@media(max-width:700px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .grid2, .grid3, .grid4 { grid-template-columns: 1fr; }
}

<script>
// Early theme initialization to prevent light flash
(function() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
})();
// ═══════════════════════════════════════════════════════════════════════════
//  MarketAI v2 — Complete Single-File Application
//  Architecture: Frontend SPA + Cloudflare Workers (fetch, store, patterns)
// ═══════════════════════════════════════════════════════════════════════════

// ── API base (works both locally via dev server and on Vercel) ─────────────
const API = '';

// ── App State ────────────────────────────────────────────────────────────────
const S = {
  snapshots:[], symbols:[], lastSync:null,
  portfolio:[], watchlists:[], watchlistItems:[], alerts:[], screeners:[],
  activePage:'dashboard', activeStock:null, sbTab:'all',
  workspaces:[
    {id:'ws1',name:'Morning Scan',active:true},
    {id:'ws2',name:'Intraday',active:false},
    {id:'ws3',name:'Swing',active:false},
  ],
  syncing:false, loaded:false,
};

// ── Core computations ────────────────────────────────────────────────────────
// ── Calculation Cache ────────────────────────────────────────────────────────
const Cache = {
  histories: {},
  stats: {},
  latestPrice: {},
  prevPrice: {},
  change: {},
  spark: {},
  topGainers: [],
  topLosers: [],
  autoPicks: [],
  hammers: [],
  summary: {}
};

function precomputeCache() {
  Cache.histories = {};
  Cache.stats = {};
  Cache.latestPrice = {};
  Cache.prevPrice = {};
  Cache.change = {};
  Cache.topGainers = [];
  Cache.topLosers = [];
  Cache.autoPicks = [];
  Cache.hammers = [];
  Cache.summary = { total: 0, advances: 0, declines: 0, unchanged: 0 };

  // 1. Build symbol histories
  for (let i = 0; i < S.snapshots.length; i++) {
    const snap = S.snapshots[i];
    for (const [sym, price] of Object.entries(snap.prices)) {
      if (typeof price === 'number' && isFinite(price) && price > 0) {
        if (!Cache.histories[sym]) {
          Cache.histories[sym] = [];
        }
        Cache.histories[sym].push({ ts: snap.ts, label: snap.label, price });
      }
    }
  }

  // 2. Precompute individual symbol stats
  S.symbols.forEach(sym => {
    const history = Cache.histories[sym] || [];
    if (history.length === 0) {
      Cache.latestPrice[sym] = null;
      Cache.prevPrice[sym] = null;
      Cache.change[sym] = null;
      Cache.stats[sym] = null;
      return;
    }
    
    const prices = history.map(h => h.price);
    const len = prices.length;
    const latest = prices[len - 1];
    const prev = len >= 2 ? prices[len - 2] : null;
    
    Cache.latestPrice[sym] = latest;
    Cache.prevPrice[sym] = prev;
    
    if (latest !== null && prev !== null && prev > 0) {
      const abs = latest - prev;
      const pct = abs / prev * 100;
      Cache.change[sym] = isFinite(pct) ? { abs, pct } : null;
    } else {
      Cache.change[sym] = null;
    }
    
    const hi = Math.max(...prices);
    const lo = Math.min(...prices);
    const avg = prices.reduce((a, b) => a + b, 0) / len;
    const first = prices[0];
    const rets = [];
    for (let i = 1; i < len; i++) {
      const ret = (prices[i] - prices[i - 1]) / prices[i - 1];
      if (isFinite(ret)) rets.push(ret);
    }
    const mean = rets.length ? rets.reduce((a, b) => a + b, 0) / rets.length : 0;
    const variance = rets.length ? rets.reduce((a, b) => a + (b - mean) ** 2, 0) / rets.length : 0;
    const vol = Math.sqrt(Math.max(0, variance)) * 100;
    const pctReturn = first > 0 ? (latest - first) / first * 100 : 0;
    
    Cache.stats[sym] = {
      hi, lo, avg, first, last: latest, count: len,
      pct: isFinite(pctReturn) ? pctReturn : 0,
      vol: isFinite(vol) ? vol : 0,
      prices, series: history
    };
  });

  // 3. Precompute global lists
  Cache.topGainers = S.symbols.map(s => {
    const c = Cache.change[s];
    const st = Cache.stats[s];
    return { sym: s, c, st };
  }).filter(x => x.c && x.c.pct > 0 && x.st && x.st.count >= 2).sort((a, b) => b.c.pct - a.c.pct);
  
  Cache.topLosers = S.symbols.map(s => {
    const c = Cache.change[s];
    const st = Cache.stats[s];
    return { sym: s, c, st };
  }).filter(x => x.c && x.c.pct < 0 && x.st && x.st.count >= 2).sort((a, b) => a.c.pct - b.c.pct);

  let a = 0, d = 0, u = 0;
  S.symbols.forEach(s => {
    const c = Cache.change[s];
    if (!c) u++;
    else if (c.pct > 0.01) a++;
    else if (c.pct < -0.01) d++;
    else u++;
  });
  Cache.summary = { total: S.symbols.length, advances: a, declines: d, unchanged: u };

  // autoPicks
  const picks = [];
  for (const sym of S.symbols) {
    const st = Cache.stats[sym];
    if (!st || st.count < 3 || st.prices.length < 2) continue;
    const c = Cache.change[sym];
    if (!c) continue;
    
    let score = 0, reasons = [];
    const avg = st.avg, last = st.last;
    
    if (last > avg) { score += 25; reasons.push('Above avg'); }
    if (last < avg) { score -= 10; }
    
    const rsi = calcRSI(st.prices);
    if (rsi < 35) { score += 20; reasons.push('RSI oversold'); }
    else if (rsi < 50 && last > avg) { score += 10; reasons.push('RSI rising'); }
    else if (rsi > 70) { score -= 15; }
    
    if (st.pct > 5) { score += 20; reasons.push(`+${st.pct.toFixed(1)}%`); }
    else if (st.pct > 2) { score += 10; }
    else if (st.pct < -5) { score -= 20; }
    
    if (st.vol >= 0 && st.vol < 2 && last > avg) { score += 10; reasons.push('Low vol'); }
    
    const fromLo = st.lo > 0 ? ((last - st.lo) / st.lo * 100) : 0;
    if (fromLo >= 0 && fromLo < 5) { score += 10; reasons.push('Near low'); }
    else if (fromLo > 80) { score -= 10; }
    
    if (score >= 35) picks.push({ sym, score: Math.min(100, Math.max(0, score)), reason: reasons.slice(0, 2).join(' · '), c });
  }
  Cache.autoPicks = picks.sort((a, b) => b.score - a.score);

  // hammerSignals
  const hammersList = [];
  for (const sym of S.symbols) {
    const history = Cache.histories[sym] || [];
    const len = history.length;
    if (len < 20) continue;
    
    const priceArr = new Float64Array(len);
    for (let i = 0; i < len; i++) {
      priceArr[i] = history[i].price;
    }

    const isDown = new Uint8Array(len - 1);
    for (let i = 0; i < len - 1; i++) {
      isDown[i] = priceArr[i] > priceArr[i+1] ? 1 : 0;
    }

    let runningDownSum = 0;
    for (let i = 0; i < 14; i++) {
      runningDownSum += isDown[i];
    }

    for (let hammerIdx = 14; hammerIdx < len - 1; hammerIdx++) {
      if (runningDownSum >= 13) {
        const prevPrice = priceArr[hammerIdx-1];
        const hammerPrice = priceArr[hammerIdx];
        const nextPrice = priceArr[hammerIdx+1];
        
        const open = prevPrice;
        const close = hammerPrice;
        const high = Math.max(prevPrice, hammerPrice);
        const low = Math.min(prevPrice, hammerPrice);
        
        const body = Math.abs(close-open) || (hammerPrice * 0.001);
        const upperShadow = high - Math.max(open, close);
        const lowerShadow = Math.min(open, close) - low;
        
        if (upperShadow < body && lowerShadow > body && lowerShadow > (body * 0.5)) {
          if (nextPrice > hammerPrice) {
            const shadowRatio = lowerShadow / (upperShadow || 1);
            const bodySmallness = Math.max(0, 1 - ((body / hammerPrice) * 100 / 2));
            const strength = Math.min(100, Math.round((shadowRatio * 40) + (bodySmallness * 60)));
            
            let score = 50;
            score += (strength * 0.3);
            if ((nextPrice - hammerPrice) / hammerPrice > 0.005) score += 15;
            if (lowerShadow / high > 0.2) score += 10;
            score = Math.min(100, Math.round(score));
            
            if (score >= 50) {
              hammersList.push({
                sym,
                ts: history[hammerIdx].ts,
                label: history[hammerIdx].label,
                price: hammerPrice,
                entry: prevPrice,
                nextPrice,
                score,
                strength,
                reason: `15d downtrend, green confirmation`
              });
            }
          }
        }
      }
      runningDownSum = runningDownSum - isDown[hammerIdx - 14] + isDown[hammerIdx];
    }
  }
  Cache.hammers = hammersList.sort((a, b) => b.score - a.score);
}

// ── Core computations ────────────────────────────────────────────────────────
function latestPrice(sym){
  return Cache.latestPrice[sym] !== undefined ? Cache.latestPrice[sym] : null;
}
function prevPrice(sym){
  return Cache.prevPrice[sym] !== undefined ? Cache.prevPrice[sym] : null;
}
function change(sym){
  return Cache.change[sym] !== undefined ? Cache.change[sym] : null;
}
function series(sym,period='all'){
  const history = Cache.histories[sym] || [];
  if(period==='all')return history;
  if(history.length===0)return [];
  const last=history[history.length-1].ts;
  const cut={d3:3*864e5,w1:7*864e5,m1:30*864e5,m3:90*864e5}[period];
  if(cut){const f=history.filter(s=>s.ts>=last-cut);if(f.length>=2)return f;}
  return history;
}
function stats(sym,period='all'){
  if (period === 'all') {
    return Cache.stats[sym] !== undefined ? Cache.stats[sym] : null;
  }
  const sr=series(sym,period);
  const pr=sr.map(s=>s.price);
  if(!pr.length)return null;
  const hi=Math.max(...pr),lo=Math.min(...pr),avg=pr.reduce((a,b)=>a+b,0)/pr.length;
  const first=pr[0],last=pr[pr.length-1];
  const rets=[];
  for(let i=1;i<pr.length;i++){
    const ret=(pr[i]-pr[i-1])/pr[i-1];
    if(isFinite(ret))rets.push(ret);
  }
  const mean=rets.length?rets.reduce((a,b)=>a+b,0)/rets.length:0;
  const variance=rets.length?rets.reduce((a,b)=>a+(b-mean)**2,0)/rets.length:0;
  const vol=Math.sqrt(Math.max(0,variance))*100;
  const pctReturn=first>0?(last-first)/first*100:0;
  return{hi,lo,avg,first,last,count:sr.length,pct:isFinite(pctReturn)?pctReturn:0,vol:isFinite(vol)?vol:0,prices:pr,series:sr};
}
function topGainers(n=10){
  return Cache.topGainers.slice(0,n);
}
function topLosers(n=10){
  return Cache.topLosers.slice(0,n);
}
function summary(){
  return Cache.summary;
}

// Auto picks (momentum + pattern score)
function autoPicks(n=6){
  return Cache.autoPicks.slice(0,n);
}
function calcRSI(prices,n=14){
  if(prices.length<n+1)return 50;
  const diffs=prices.slice(1).map((p,i)=>p-prices[i]);
  const recent=diffs.slice(-n);
  const gains=recent.filter(d=>d>0).reduce((a,b)=>a+b,0)/n;
  const losses=recent.filter(d=>d<0).map(d=>-d).reduce((a,b)=>a+b,0)/n;
  if(losses===0)return 100;
  return 100-100/(1+gains/losses);
}
function hammerSignals(){
  return Cache.hammers;
}

// ── Formatting ───────────────────────────────────────────────────────────────
const fp=p=>(p==null||isNaN(p))?'—':'Rs '+((+p).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}));
const fc=(c,short=false)=>!c?'—':`${c.pct>=0?'+':''}${short?c.pct.toFixed(2)+'%':c.abs.toFixed(2)+' ('+c.pct.toFixed(2)+'%)'}`;
const fago=ts=>{const d=Date.now()-ts;if(d<60000)return 'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400e3)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400e3)+'d ago';};
const fdt=ts=>ts?new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const fds=ts=>ts?new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
const cc=c=>!c?'nu':c.pct>0?'up':'dn';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

function spark(sym,w=52,h=22){
  const st=Cache.stats[sym];
  if(!st||st.count<2)return`<svg width="${w}" height="${h}"></svg>`;
  const pr=st.prices;
  const mn=st.lo,mx=st.hi,rng=mx-mn||1;
  const pts=pr.map((p,i)=>`${(i/(pr.length-1))*(w-2)+1},${h-((p-mn)/rng)*(h-4)-2}`).join(' ');
  const c=Cache.change[sym];
  const col=c?(c.pct>=0?'#00f5b4':'#ff4d6d'):'rgba(255, 255, 255, 0.15)';
  return`<svg width="${w}" height="${h}" class="sparksvg"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
}

// Canvas chart
const DPR=Math.min(window.devicePixelRatio||1,2);
function drawChart(canvas,sr,sym){
  if(!canvas)return;
  const outer=canvas.parentElement;
  const W=outer?outer.clientWidth:600,H=outer?outer.clientHeight:220;
  canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(DPR,DPR);
  const pr=sr.map(s=>s.price).filter(p=>typeof p==='number'&&isFinite(p)&&p>0);
  if(pr.length<2){ctx.fillStyle='#606880';ctx.font='11px Inter, sans-serif';ctx.textAlign='center';ctx.fillText('Insufficient data',W/2,H/2);return;}
  const mn=Math.min(...pr),mx=Math.max(...pr),rng=mx-mn||mx*0.01||1;
  const pad={t:16,b:28,l:60,r:12};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const xp=i=>pad.l+(i/(pr.length-1))*cw;
  const yp=v=>pad.t+(1-(v-mn)/rng)*ch;
  // grid
  ctx.strokeStyle='#1e2030';ctx.lineWidth=1;ctx.setLineDash([2,4]);
  for(let i=0;i<=4;i++){
    const y=pad.t+(i/4)*ch;const val=mx-(i/4)*rng;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#606880';ctx.font='9px Inter, sans-serif';ctx.textAlign='right';
    ctx.fillText((val>=1000?val.toFixed(0):val.toFixed(2)),pad.l-4,y+3);
  }
  ctx.setLineDash([]);
  // x labels
  ctx.fillStyle='#606880';ctx.font='8px Inter, sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.ceil(sr.length/Math.floor(cw/50)));
  for(let i=0;i<sr.length;i+=step){
    if(sr[i]?.ts)ctx.fillText(new Date(sr[i].ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}),xp(i),H-6);
  }
  // gradient
  const isUp=pr[pr.length-1]>=pr[0];
  const col=isUp?'#ff2e93':'#ff4d6d';
  const lineGrad = ctx.createLinearGradient(pad.l, 0, W - pad.r, 0);
  if (isUp) {
    lineGrad.addColorStop(0, '#ff2e93');
    lineGrad.addColorStop(1, '#ff7ebb');
  } else {
    lineGrad.addColorStop(0, '#ff4d6d');
    lineGrad.addColorStop(1, '#ff003c');
  }
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,isUp?'rgba(255, 46, 147, 0.25)':'rgba(255, 77, 109, 0.25)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(xp(0),yp(pr[0]));
  for(let i=1;i<pr.length;i++)ctx.lineTo(xp(i),yp(pr[i]));
  ctx.lineTo(xp(pr.length-1),pad.t+ch);ctx.lineTo(pad.l,pad.t+ch);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // line
  ctx.beginPath();ctx.moveTo(xp(0),yp(pr[0]));
  for(let i=1;i<pr.length;i++)ctx.lineTo(xp(i),yp(pr[i]));
  ctx.strokeStyle=lineGrad;ctx.lineWidth=2.5;ctx.lineJoin='round';
  ctx.shadowColor=col;ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;
  // dot
  const lx=xp(pr.length-1),ly=yp(pr[pr.length-1]);
  ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  // tooltip data
  canvas._data={sr,pr,xp,yp,col};
}
function addChartTooltip(canvas,tipEl){
  if(!canvas||!tipEl)return;
  canvas.style.cursor='crosshair';
  canvas.onmousemove=e=>{
    const d=canvas._data;if(!d)return;
    const rect=canvas.getBoundingClientRect();const mx=e.clientX-rect.left;
    let best=0,bd=Infinity;
    d.pr.forEach((_,i)=>{const dist=Math.abs(d.xp(i)-mx);if(dist<bd){bd=dist;best=i;}});
    if(bd>50){tipEl.style.display='none';return;}
    const p=d.pr[best],prev=best>0?d.pr[best-1]:null;
    const pct=prev?((p-prev)/prev*100).toFixed(2):null;
    tipEl.style.display='block';
    tipEl.style.left=Math.min(d.xp(best)+12,canvas.offsetWidth-130)+'px';
    tipEl.style.top=Math.max(0,d.yp(p)-50)+'px';
    tipEl.innerHTML=`<div style="font-size:9px;color:var(--t3);margin-bottom:3px">${d.sr[best]?.label||fdt(d.sr[best]?.ts)}</div>
    <div style="font-family:var(--display);font-size:14px;font-weight:700;color:${d.col}">${fp(p)}</div>
    ${pct?`<div style="font-size:10px;color:${+pct>=0?'var(--green)':'var(--red)'}">${+pct>=0?'+':''}${pct}%</div>`:''}`;
  };
  canvas.onmouseleave=()=>{tipEl.style.display='none';};
}

// Distribution bars
function distBar(el,prices){
  if(!el||!prices||prices.length<3){if(el)el.innerHTML='<span style="color:var(--t3);font-size:10px">Not enough data</span>';return;}
  const mn=Math.min(...prices),mx=Math.max(...prices),rng=mx-mn||1;
  const B=12,counts=new Array(B).fill(0);
  prices.forEach(p=>{const b=Math.min(B-1,Math.floor((p-mn)/rng*B));counts[b]++;});
  const mc=Math.max(...counts)||1;
  el.innerHTML='<div style="display:flex;align-items:flex-end;gap:2px;height:50px">'+

// Helper functions for client-side parsing of Google Sheets data
function cleanStr(v) {
  if (!v) return "";
  let s = String(v).trim();
  if (s.startsWith('"') && s.endsWith('"')) {
    s = s.slice(1, -1).trim();
  }
  return s;
}

function parseSheetTimestamp(raw) {
  const s = cleanStr(raw);
  if (!s || s === "SYMBOL") return null;
  if (/^\d{10,}$/.test(s)) {
    const ts = +s;
    if (ts >= 946684800000 && ts <= 4102444800000) return ts;
    return null;
  }
  const gviz = s.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/i);
  if (gviz) {
    const [, yr, mo, day, hh = 0, mm = 0, ss = 0] = gviz;
    const yr_num = +yr;
    if (yr_num < 2000 || yr_num > 2100) return null;
    const ts = new Date(yr_num, +mo, +day, +hh, +mm, +ss).getTime();
    return isNaN(ts) ? null : ts;
  }
  const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (dmy) {
    const [, day, mon, yr, hh, mm, ss = "00"] = dmy;
    const yr_num = +yr;
    if (yr_num < 2000 || yr_num > 2100) return null;
    const ts = new Date(`${yr}-${mon.padStart(2, "0")}-${day.padStart(2, "0")}T${hh.padStart(2, "0")}:${mm}:${ss}`).getTime();
    return isNaN(ts) ? null : ts;
  }
  const d = new Date(s);
  const ts = d.getTime();
  if (!isNaN(ts) && ts >= 946684800000 && ts <= 4102444800000) return ts;
  return null;
}

function parseSheetPrice(raw) {
  if (!raw) return null;
  let s = cleanStr(raw);
  if (!s || ["#N/A", "N/A", "#VALUE!", "#REF!", "#ERROR!", "#NUM!"].includes(s)) return null;
  let n = parseFloat(s);
  if (isNaN(n)) n = parseFloat(s.replace(/[^\d.-]/g, ""));
  return isFinite(n) && n > 0 ? n : null;
}

function fetchFromGoogleSheetsRealtime() {
  return new Promise((resolve, reject) => {
    const sheetId = '1o6L7bHDrUozEPaLFsXPtls7Jey88lQm0789fq5T2GqA';
    
    function fetchJSONP(sheetName) {
      return new Promise((res, rej) => {
        const callbackName = 'googleSheetCallback_' + Math.round(Math.random() * 1000000);
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${callbackName}&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
        
        const script = document.createElement('script');
        script.src = url;
        script.id = callbackName;
        
        window[callbackName] = function(data) {
          cleanup();
          res(data);
        };
        
        script.onerror = function(err) {
          cleanup();
          rej(new Error(`Failed to load sheet ${sheetName} via JSONP`));
        };
        
        function cleanup() {
          try { document.getElementById(callbackName)?.remove(); } catch(e) {}
          try { delete window[callbackName]; } catch(e) {}
        }
        
        document.body.appendChild(script);
      });
    }

    Promise.all([
      fetchJSONP('SYMBOLS').catch(err => {
        console.warn('SYMBOLS sheet fetch failed, proceeding with NSE sheet only:', err);
        return null;
      }),
      fetchJSONP('NSE')
    ])
      .then(([symbolsData, nseData]) => {
        try {
          // Extract symbols rows
          const s1Rows = [];
          if (symbolsData?.table?.rows) {
            for (const r of symbolsData.table.rows) {
              if (!r || !r.c) continue;
              s1Rows.push(r.c.map(cell => cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v) : '') : ''));
            }
          }

          // Extract NSE rows
          const s2Rows = [];
          if (nseData?.table?.rows) {
            for (const r of nseData.table.rows) {
              if (!r || !r.c) continue;
              s2Rows.push(r.c.map(cell => cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v) : '') : ''));
            }
          }

          if (s2Rows.length < 2) throw new Error("No snapshots parsed from direct NSE fetch");

          let header = [];
          let headerFromCols = false;
          if (nseData.table.cols && nseData.table.cols.length > 0) {
            header = nseData.table.cols.map(c => c.label || '');
            headerFromCols = true;
          }
          if (header.length === 0 || (!String(header[0] || '').toUpperCase().includes('SYMBOL') && s2Rows.length > 0)) {
            header = s2Rows[0] || [];
            headerFromCols = false;
          }

          const firstColHeader = String(header[0] || '').trim().toUpperCase();
          const isNewFormat = firstColHeader.includes("SYMBOL") || isNaN(Number(s2Rows[0]?.[0] || ''));
          const startCol = isNewFormat ? 1 : 0;

          const meta = [];
          const MAX_SNAPSHOTS = 200;
          const colLimit = Math.max(startCol, header.length - MAX_SNAPSHOTS);
          for (let c = colLimit; c < header.length; c++) {
            const colTs = parseSheetTimestamp(header[c]);
            if (colTs) meta.push({ col: c, label: String(header[c] || '').trim(), ts: colTs });
          }

          const priceMap = {};
          meta.forEach(m => { priceMap[m.ts + "_" + m.col] = {}; });
          const symsSet = new Set();

          const startRow = headerFromCols ? 0 : 1;
          for (let r = startRow; r < s2Rows.length; r++) {
            const row = s2Rows[r];
            if (!row || row.length === 0) continue;
            
            let sym = cleanStr(row[0]).toUpperCase().replace(/\s+/g, "");
            if (!sym || sym === "SYMBOL" || sym.includes("SYMBOL-NSE") || sym.includes("SYMBOL–NSE")) continue;

            for (const m of meta) {
              const p = parseSheetPrice(row[m.col]);
              if (p !== null) {
                priceMap[m.ts + "_" + m.col][sym] = p;
                symsSet.add(sym);
              }
            }
          }

          const validAdded = meta
            .map(m => ({
              id: `snap_${m.ts}_${m.col}`,
              ts: m.ts,
              label: m.label,
              prices: priceMap[m.ts + "_" + m.col]
            }))
            .filter(s => Object.keys(s.prices).length > 0)
            .sort((a, b) => a.ts - b.ts);

          resolve({
            snapshots: validAdded,
            symbols: [...symsSet].sort(),
            lastSync: Date.now(),
            syncCount: 1,
            portfolio: S.portfolio || [],
            watchlists: S.watchlists || [],
            watchlistItems: S.watchlistItems || [],
            alerts: S.alerts || [],
            screeners: S.screeners || []
          });
        } catch (e) {
          reject(e);
        }
      })
      .catch(reject);
  });
}

async function fetchData(){
  try {
    const r=await fetch(`${API}/api/data`);
    if(r.ok) return await r.json();
  } catch (err) {
    console.warn('API fetch failed, trying local storage cache...', err);
  }
  
  try {
    const cached = JSON.parse(localStorage.getItem('marketai_cache') || '{}');
    if (cached.snapshots && cached.snapshots.length > 0) {
      return cached;
    }
  } catch(e) {}
  
  return await fetchFromGoogleSheetsRealtime();
}
async function saveUserData(){
  // Update local cache
  try {
    const cached = JSON.parse(localStorage.getItem('marketai_cache') || '{}');
    cached.portfolio = S.portfolio;
    cached.watchlists = S.watchlists;
    cached.watchlistItems = S.watchlistItems;
    cached.alerts = S.alerts;
    cached.screeners = S.screeners;
    localStorage.setItem('marketai_cache', JSON.stringify(cached));
  } catch(e) {}

  await fetch(`${API}/api/data`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({portfolio:S.portfolio,watchlists:S.watchlists,watchlistItems:S.watchlistItems,alerts:S.alerts,screeners:S.screeners})});

async function doSync(silent=false){
  if(S.syncing)return;
  S.syncing=true;
  const btn=document.getElementById('syncBtn');
  if(btn){btn.disabled=true;btn.textContent='Syncing...';}
  setSyncState('spin','Syncing...');
  setLoad(30);
  try{
    let d;
    try {
      const r=await fetch(`${API}/api/sync`, { method: 'POST' });
      const j=await r.json();
      setLoad(70);
      if(!j.ok)throw new Error(j.error||'Sync failed');
      d=await fetchData();
    } catch (apiErr) {
      console.warn('Server sync failed, falling back to direct browser sync from Google Sheets:', apiErr);
      setLoad(50);
      d = await fetchFromGoogleSheetsRealtime();
      try {
        localStorage.setItem('marketai_cache', JSON.stringify({
          snapshots: d.snapshots.slice(-5),
          symbols: d.symbols,
          lastSync: d.lastSync
        }));
      } catch(e) {}
    }
    mergeData(d);
    setLoad(100);
    setSyncState('ok',`Synced ${fago(S.lastSync)} · ${S.snapshots.length} snaps`);
    if(!silent)toast(`Synced ${S.snapshots.length} snapshots · ${S.symbols.length} symbols`,'ok');
    renderAll();
  }catch(e){
    setSyncState('err','Sync failed');
    if(!silent)toast(e.message,'err');
  }finally{
    S.syncing=false;
    if(btn){btn.disabled=false;btn.textContent='Sync';}
    setTimeout(()=>setLoad(0),600);
  }
}

function mergeData(d){
  if(d.snapshots)S.snapshots=d.snapshots.sort((a,b)=>a.ts-b.ts);
  if(d.symbols)S.symbols=d.symbols;
  if(d.lastSync)S.lastSync=d.lastSync;
  if(d.portfolio)S.portfolio=d.portfolio;
  if(d.watchlists)S.watchlists=d.watchlists;
  if(d.watchlistItems)S.watchlistItems=d.watchlistItems;
  if(d.alerts)S.alerts=d.alerts;
  if(d.screeners)S.screeners=d.screeners;
  precomputeCache();

  // Save to localStorage (limit to latest 5 snapshots to prevent QuotaExceededError)
  try {
    localStorage.setItem('marketai_cache', JSON.stringify({
      snapshots: S.snapshots.slice(-5),
      symbols: S.symbols,
      lastSync: S.lastSync,
      portfolio: S.portfolio,
      watchlists: S.watchlists,
      watchlistItems: S.watchlistItems,
      alerts: S.alerts,
      screeners: S.screeners
    }));
  } catch(e) {
    console.warn('Failed to save to localStorage:', e);
  }
}

async function askGroq(prompt,context=''){
  const messages=[
    {role:'system',content:`You are MarketAI, a professional NSE stock market analyst. Be concise, data-driven, and use numbers. Context: ${context}`},
    {role:'user',content:prompt}
  ];
  const r=await fetch(`${API}/api/groq`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages,max_tokens:400})});

  const sum=summary();const gainers=topGainers(3);const losers=topLosers(3);
  el.innerHTML='<div class="ai-spinner"><div class="spin-ring"></div>Analyzing market data...</div>';
  try{
    const ctx=`NSE market: ${sum.total} stocks, ${sum.advances} advancing, ${sum.declines} declining. Top gainers: ${gainers.map(g=>g.sym+' '+fc(g.c,true)).join(', ')}. Top losers: ${losers.map(l=>l.sym+' '+fc(l.c,true)).join(', ')}. Snapshots: ${S.snapshots.length}.`;
    const text=await askGroq('Give a 3-sentence professional market briefing with key insights and what traders should watch today.',ctx);
    el.innerHTML=text||'No AI analysis available.';
  }catch(e){el.innerHTML='AI briefing unavailable. Set GROQ_API_KEY in Vercel environment variables.';}
};

function glCard(title,list){
  if(!list.length)return`<div class="card"><div class="card-hdr"><div class="card-title">${title}</div></div><div class="empty"><div class="empty-sub">No data — sync first</div></div></div>`;
  return`<div class="card">

}

window.setWS=function(id,el){
  S.workspaces.forEach(w=>w.active=w.id===id);
  document.querySelectorAll('.ws-tab').forEach(e=>e.classList.remove('active'));
  if(el)el.classList.add('active');
};
window.addWSModal=function(){
  showModal('New Workspace',`
    <div class="form-grp"><label class="form-lbl">Name</label><input class="form-inp" id="wsName" placeholder="e.g. Pre-Market Scan"></div>`,
    `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>

};
window.doAddWS=function(){
  const n=document.getElementById('wsName')?.value?.trim();if(!n)return;
  S.workspaces.push({id:'ws'+uid(),name:n,active:false});
  closeModal();nav('dashboard');
};

// ── STOCKS ───────────────────────────────────────────────────────────────────
Pages.stocks=function(el){
  let sort='sym',dir=1,q='',tab='all';
  let page=1;
  const pageSize=100;

  function render(){
    let syms=[...S.symbols].filter(s=>{const st=stats(s);return st&&st.count>=2;});
    if(q)syms=syms.filter(s=>s.includes(q.toUpperCase()));
    if(tab==='gain')syms=syms.filter(s=>{const c=change(s);return c&&c.pct>0.01;});
    if(tab==='loss')syms=syms.filter(s=>{const c=change(s);return c&&c.pct<-0.01;});
    syms.sort((a,b)=>{
      let va,vb;
      if(sort==='sym'){va=a;vb=b;}
      else if(sort==='price'){va=latestPrice(a)||0;vb=latestPrice(b)||0;}
      else if(sort==='chg'){va=change(a)?.pct||0;vb=change(b)?.pct||0;}
      else if(sort==='snaps'){va=series(a).length;vb=series(b).length;}
      if(typeof va==='string')return va.localeCompare(vb)*dir;
      return(va-vb)*dir;
    });

    const total = syms.length;
    const maxPage = Math.ceil(total / pageSize) || 1;
    if(page > maxPage) page = maxPage;
    if(page < 1) page = 1;
    const startIdx = (page - 1) * pageSize;
    const endIdx = startIdx + pageSize;
    const pageSyms = syms.slice(startIdx, endIdx);

    const arr=dir===1?'&#x2191;':'&#x2193;';
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Stocks</div><div class="page-sub">${syms.length} of ${S.symbols.length} symbols (${S.symbols.length-syms.length} with insufficient data) — ${S.activeExchange||'NSE'}</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input id="stocksSearch" placeholder="Search..." oninput="stSearch(this.value)" style="font-size:11px;padding:5px 9px;width:160px" value="${q}">
        <div class="sb-tabs">
          ${['all','gain','loss'].map(t=>`<button class="sb-tab${tab===t?' active':''}" onclick="stTab('${t}',this)">${t==='all'?'All':t==='gain'?'Gainers':'Losers'}</button>`).join('')}
        </div>
      </div>
    </div>
    <div style="flex:1;overflow:auto;display:flex;flex-direction:column">
      ${!syms.length?`<div class="empty"><div class="empty-title">${S.symbols.length?'No matches':'No data'}</div><div class="empty-sub">${S.symbols.length?'Try a different filter':'Click Sync to load market data'}</div></div>`:`
      <div class="tbl-wrap" style="margin:0;flex:1;overflow:auto"><table>
        <thead><tr>
          <th onclick="stSort('sym')" style="cursor:pointer">Symbol${sort==='sym'?arr:''}</th>
          <th>Sparkline</th>
          <th onclick="stSort('price')" style="cursor:pointer">Price${sort==='price'?arr:''}</th>
          <th onclick="stSort('chg')" style="cursor:pointer">Change${sort==='chg'?arr:''}</th>
          <th>High</th><th>Low</th>
          <th onclick="stSort('snaps')" style="cursor:pointer">Snaps${sort==='snaps'?arr:''}</th>
          <th>Action</th>
        </tr></thead>
        <tbody>${pageSyms.map(sym=>{
          const p=latestPrice(sym),c=change(sym),cls=cc(c),st=stats(sym);
          return`<tr onclick="openStock('${sym}')" style="cursor:pointer">
            <td class="td-sym">${sym}</td>
            <td>${spark(sym,56,20)}</td>
            <td class="${cls}" style="font-family:var(--display);font-weight:700">${fp(p)}</td>
            <td class="${cls}" style="font-weight:700">${c?fc(c,true):'—'}</td>
            <td class="up" style="font-size:11px">${st?fp(st.hi):'—'}</td>
            <td class="dn" style="font-size:11px">${st?fp(st.lo):'—'}</td>
            <td style="color:var(--t3)">${st?st.count:'—'}</td>
            <td onclick="event.stopPropagation()">
              <button class="btn btn-sm btn-ghost" onclick="openStock('${sym}')">View</button>
            </td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.25);border-top:1px solid rgba(255,255,255,0.3);flex-shrink:0">
        <div style="font-size:11px;color:var(--t2)">Showing ${startIdx + 1}-${Math.min(endIdx, total)} of ${total}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-ghost" onclick="stPage(-1)" ${page === 1 ? 'disabled' : ''}>Previous</button>
          <span style="font-size:11px;align-self:center;color:var(--t2)">Page ${page} of ${maxPage}</span>
          <button class="btn btn-sm btn-ghost" onclick="stPage(1)" ${page === maxPage ? 'disabled' : ''}>Next</button>
        </div>
      </div>
      `}
    </div>`;
  }
  window.stSearch=v=>{
    q=v;
    page=1;
    const activeId = document.activeElement ? document.activeElement.id : null;
    const start = document.activeElement ? document.activeElement.selectionStart : null;
    const end = document.activeElement ? document.activeElement.selectionEnd : null;
    render();
    if (activeId) {
      const el = document.getElementById(activeId);
      if (el) {
        el.focus();
        if (start !== null && end !== null && typeof el.setSelectionRange === 'function') {
          el.setSelectionRange(start, end);
        }
      }
    }
  };
  window.stTab=(t,btn)=>{tab=t;page=1;render();};
  window.stSort=col=>{if(sort===col)dir*=-1;else{sort=col;dir=col==='sym'?1:-1;}page=1;render();};
  window.stPage=delta=>{page+=delta;render();};
  render();

};
