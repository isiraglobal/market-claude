<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketAI — NSE Intelligence Terminal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%2300e5a0'/><text y='23' x='4' font-size='22' font-family='monospace' font-weight='bold' fill='%23000'>M</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ──────────────────────────────────────────────────────── */
:root{
  --bg:#09090f; --s1:#0f1018; --s2:#14151f; --s3:#1a1b28;
  --b1:#1e2030; --b2:#272940; --b3:#353760;
  --accent:#00d4aa; --accent-dim:#00a882;
  --blue:#4f8ef7; --red:#f25c6e; --green:#00d4aa;
  --yellow:#f5c14e; --orange:#f58b4e; --purple:#9f7aea;
  --t1:#e8eaf2; --t2:#a0a8c0; --t3:#606880;
  --mono:'JetBrains Mono',monospace; --display:'Inter',sans-serif;
  --r4:4px; --r6:6px; --r8:8px; --r12:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--mono);font-size:13px;line-height:1.5;overflow:hidden}
a{color:var(--accent);text-decoration:none}
input,select,textarea{font-family:var(--mono);font-size:12px;background:var(--s1);color:var(--t1);border:1px solid var(--b2);border-radius:var(--r6);padding:7px 11px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--t3)}
select option{background:var(--s2)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:3px}
.up{color:var(--green)} .dn{color:var(--red)} .nu{color:var(--t3)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;padding:0 18px;flex-shrink:0;z-index:100}
.logo{font-family:var(--display);font-size:17px;font-weight:800;letter-spacing:-.5px;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
.mainnav{display:flex;gap:2px;flex:1;overflow:hidden}
.navlink{padding:5px 10px;border-radius:var(--r4);font-size:10px;color:var(--t3);cursor:pointer;transition:all .12s;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;border:none;background:none;font-family:var(--mono)}
.navlink:hover{color:var(--t1);background:var(--s3)}
.navlink.active{color:var(--accent);background:rgba(0,212,170,.08);font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sync-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.spin{background:var(--yellow);animation:pulse .8s infinite}
.sync-lbl{font-size:10px;color:var(--t3);white-space:nowrap}
#syncBtn{padding:5px 13px;font-size:10px;border-radius:var(--r4);border:none;background:var(--accent);color:#000;font-family:var(--mono);font-weight:700;cursor:pointer;letter-spacing:.3px;text-transform:uppercase;transition:all .12s}
#syncBtn:hover{background:#00ffcc;transform:translateY(-1px)}
#syncBtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.topbar select{font-size:11px;padding:4px 8px;border-color:var(--b2)}
.loadbar{height:2px;background:var(--accent);position:fixed;top:0;left:0;z-index:999;transition:width .3s;box-shadow:0 0 6px var(--accent)}
#ticker{height:30px;background:var(--s2);border-bottom:1px solid var(--b1);overflow:hidden;display:none;flex-shrink:0}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 60s linear infinite;height:100%;align-items:center}
.ticker-inner:hover{animation-play-state:paused}
.ti{padding:0 16px;font-size:10px;border-right:1px solid var(--b1);height:100%;display:flex;align-items:center;gap:6px}
.ti-sym{font-family:var(--display);font-weight:700;font-size:10px}
.body{display:grid;grid-template-columns:220px 1fr;flex:1;overflow:hidden;min-height:0}
.sidebar{background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:12px 14px;border-bottom:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.sb-title{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.sb-tabs{display:flex;gap:2px}
.sb-tab{flex:1;padding:4px;font-size:9px;border-radius:var(--r4);border:1px solid var(--b1);cursor:pointer;color:var(--t3);transition:all .12s;text-align:center;background:transparent;font-family:var(--mono);letter-spacing:.3px}
.sb-tab.active{background:rgba(0,212,170,.12);color:var(--accent);border-color:rgba(0,212,170,.25);font-weight:700}
.sb-list{flex:1;overflow-y:auto}
.si{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s}
.si:hover{background:var(--s2)}
.si.active{background:var(--s3);border-left:2px solid var(--accent)}
.si-info{flex:1;min-width:0}
.si-sym{font-family:var(--display);font-size:11px;font-weight:700}
.si-chg{font-size:9px;margin-top:1px}
.si-price{font-size:11px;font-weight:700;text-align:right;flex-shrink:0}
.main{overflow:hidden;display:flex;flex-direction:column}
#pageArea{flex:1;overflow:hidden;animation:fadeUp .2s ease}

/* ── COMMON COMPONENTS ───────────────────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r8);padding:16px}
.card-sm{padding:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.4px}
.badge-g{background:rgba(0,212,170,.12);color:var(--green);border:1px solid rgba(0,212,170,.2)}
.badge-r{background:rgba(242,92,110,.12);color:var(--red);border:1px solid rgba(242,92,110,.2)}
.badge-y{background:rgba(245,193,78,.12);color:var(--yellow);border:1px solid rgba(245,193,78,.2)}
.badge-b{background:rgba(79,142,247,.12);color:var(--blue);border:1px solid rgba(79,142,247,.2)}
.badge-p{background:rgba(159,122,234,.12);color:var(--purple);border:1px solid rgba(159,122,234,.2)}
.badge-n{background:var(--s3);color:var(--t3);border:1px solid var(--b2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r6);border:none;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-sm{padding:5px 10px;font-size:9px}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#00ffcc;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--b2);color:var(--t2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(242,92,110,.15);border:1px solid rgba(242,92,110,.3);color:var(--red)}
.btn-danger:hover{background:rgba(242,92,110,.25)}
.tbl-wrap{overflow:auto;border:1px solid var(--b1);border-radius:var(--r8)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{padding:8px 12px;text-align:left;color:var(--t3);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:var(--s2);border-bottom:1px solid var(--b1);white-space:nowrap}
tbody td{padding:8px 12px;border-bottom:1px solid var(--b1);color:var(--t2)}
tbody tr:hover td{background:var(--s2);color:var(--t1)}
tbody tr:last-child td{border-bottom:none}
.td-sym{font-family:var(--display);font-weight:700;color:var(--t1);font-size:12px}
.sbar{display:flex;align-items:center;gap:5px}
.sbar-track{flex:1;height:3px;background:var(--b2);border-radius:3px;overflow:hidden;min-width:40px}
.sbar-fill{height:100%;border-radius:3px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grp{margin-bottom:12px}
.form-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
.form-inp{width:100%}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:50px 20px;color:var(--t3);text-align:center}
.empty-icon{font-size:36px;opacity:.2}
.empty-title{font-family:var(--display);font-size:15px;font-weight:700;color:var(--t3)}
.empty-sub{font-size:11px;color:var(--t3);max-width:260px;line-height:1.6}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;backdrop-filter:blur(4px);display:none}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:901;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r12);padding:22px;min-width:360px;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.6);display:none}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-family:var(--display);font-size:15px;font-weight:800}
.modal-close{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--t1)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--b1)}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r8);padding:11px 16px;font-size:11px;display:flex;align-items:center;gap:10px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:auto}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:rgba(0,212,170,.3)}
.toast.err{border-color:rgba(242,92,110,.3)}
.info-rows .ir{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b1);font-size:11px}
.info-rows .ir:last-child{border-bottom:none}
.ir-key{color:var(--t3)}
.ir-val{font-weight:700;color:var(--t1)}
.page-hdr{padding:16px 20px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.page-title{font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:-.3px}
.page-sub{font-size:10px;color:var(--t3);margin-top:2px}
.page-body{flex:1;overflow:auto;padding:18px 20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r8);padding:13px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.ka::before{background:var(--accent)}
.kpi.kr::before{background:var(--red)}
.kpi.kb::before{background:var(--blue)}
.kpi.ky::before{background:var(--yellow)}
.kpi-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.kpi-val{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:-1px}
.kpi-sub{font-size:9px;color:var(--t3);margin-top:3px}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title{font-family:var(--display);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--b1)}
.sec-count{font-size:9px;color:var(--t3);background:var(--s3);border:1px solid var(--b2);padding:2px 7px;border-radius:10px;white-space:nowrap}
.chart-outer{position:relative;border:1px solid var(--b1);border-radius:var(--r8);overflow:hidden;background:var(--bg)}
.chart-tip{position:absolute;display:none;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r6);padding:8px 12px;pointer-events:none;z-index:20;min-width:110px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.period-row{display:flex;gap:3px}
.prd{padding:3px 9px;border-radius:var(--r4);font-size:9px;border:1px solid var(--b2);color:var(--t3);cursor:pointer;background:transparent;font-family:var(--mono);font-weight:700;letter-spacing:.3px;text-transform:uppercase;transition:all .12s}
.prd.active,.prd:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.sparksvg{display:block;flex-shrink:0}
.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.pick-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r8);padding:13px;cursor:pointer;transition:all .12s;border-left:3px solid var(--b2)}
.pick-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,212,170,.08)}
.pick-card.up-pick{border-left-color:var(--green)}
.pick-card.dn-pick{border-left-color:var(--red)}
.pick-sym{font-family:var(--display);font-size:13px;font-weight:800}
.pick-score{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:var(--s3);border:1px solid var(--b2);color:var(--accent)}
.pick-price{font-family:var(--display);font-size:17px;font-weight:800;letter-spacing:-.5px;margin-top:5px}
.pick-chg{font-size:10px;font-weight:700;margin-top:1px}
.pick-reason{font-size:9px;color:var(--t3);margin-top:5px;line-height:1.5}
.gl-row{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--b1);cursor:pointer;border-radius:var(--r4);transition:background .1s;padding:7px 6px}
.gl-row:hover{background:var(--s2)}
.gl-row:last-child{border-bottom:none}
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.mkt-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r8);padding:12px 14px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.mkt-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.mkt-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--b1)}
.mkt-card.up::after{background:var(--green)}
.mkt-card.dn::after{background:var(--red)}
.mkt-sym{font-family:var(--display);font-size:12px;font-weight:800}
.mkt-price{font-family:var(--display);font-size:16px;font-weight:700;margin-top:5px}
.mkt-chg{font-size:10px;font-weight:700;margin-top:1px}
.mkt-spark{position:absolute;bottom:10px;right:10px;opacity:.3}
.detail-hdr{background:var(--s1);border-bottom:1px solid var(--b1);padding:15px 20px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;flex-shrink:0}
.detail-sym{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:-.5px}
.detail-meta{display:flex;gap:7px;margin-top:5px;flex-wrap:wrap;align-items:center}
.meta-tag{font-size:9px;padding:2px 7px;border-radius:var(--r4);background:var(--s3);border:1px solid var(--b2);color:var(--t3);letter-spacing:.4px;text-transform:uppercase}
.detail-price{text-align:right}
.dp-main{font-family:var(--display);font-size:26px;font-weight:800;letter-spacing:-1px}
.dp-chg{font-size:12px;font-weight:700;margin-top:3px}
.detail-body{display:grid;grid-template-columns:1fr 240px;flex:1;overflow:hidden;min-height:0}
.detail-left{overflow:auto;padding:18px 20px;display:flex;flex-direction:column;gap:18px}
.detail-right{border-left:1px solid var(--b1);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.mini-stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.ms{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r6);padding:9px 11px}
.ms-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.ms-val{font-family:var(--display);font-size:14px;font-weight:800}
.ai-box{background:var(--s3);border:1px solid var(--b2);border-radius:var(--r8);padding:12px 14px;font-size:11px;color:var(--t2);line-height:1.7;min-height:60px}
.ai-spinner{display:inline-flex;align-items:center;gap:8px;color:var(--t3);font-size:10px}
.spin-ring{width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.ws-bar{display:flex;gap:4px;overflow-x:auto;padding:8px 16px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0}
.ws-tab{padding:4px 12px;border-radius:var(--r4);font-size:10px;color:var(--t3);cursor:pointer;white-space:nowrap;border:1px solid transparent;font-family:var(--mono);background:transparent;transition:all .12s}
.ws-tab:hover{background:var(--s3);color:var(--t1)}
.ws-tab.active{background:rgba(0,212,170,.08);color:var(--accent);border-color:rgba(0,212,170,.2);font-weight:700}
.toggle{width:34px;height:18px;background:var(--b2);border-radius:18px;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:13px;height:13px;background:#fff;border-radius:50%;top:2.5px;left:2.5px;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
@media(max-width:900px){
  .body{grid-template-columns:1fr}
  .sidebar{display:none}
  .kpis{grid-template-columns:repeat(3,1fr)}
  .mini-stat-grid{grid-template-columns:repeat(3,1fr)}
  .detail-body{grid-template-columns:1fr}
  .detail-right{display:none}
  /* Show bottom nav on mobile */
  .mobile-nav { display: grid; }
  #app { padding-bottom: 56px; }
  .mainnav { display: none !important; }
  /* Show sidebar as full page on mobile when Stocks tab active */
  .body.show-sidebar-on-mobile .sidebar { display: flex !important; width: 100% !important; height: 100% !important; }
  .body.show-sidebar-on-mobile .main { display: none !important; }
}
@media(max-width:700px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
}

/* ── MOBILE NAV BAR ──────────────────────────────────────────────────────── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--s1);
  border-top: 1px solid var(--b1);
  grid-template-columns: repeat(5, 1fr);
  z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.m-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--t3);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  cursor: pointer;
  gap: 3px;
  transition: color 0.12s, background-color 0.12s;
}
.m-nav-item:hover { color: var(--t1); }
.m-nav-item.active { color: var(--accent); font-weight: 700; }
.m-nav-icon { width: 18px; height: 18px; }

/* ── MORE PAGE GRID ──────────────────────────────────────────────────────── */
.more-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.more-card { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r8); padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .12s; }
.more-card:hover { border-color: var(--accent); transform: translateY(-1px); background: var(--s2); }

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  MarketAI v2 — Complete Single-File Application
//  Architecture: Frontend SPA + Cloudflare Workers (fetch, store, patterns)
// ═══════════════════════════════════════════════════════════════════════════

// ── API base (works both locally via dev server and on Vercel) ─────────────
const API = '';

// ── App State ────────────────────────────────────────────────────────────────
const S = {
  snapshots:[], symbols:[], lastSync:null,
  portfolio:[], watchlists:[], watchlistItems:[], alerts:[], screeners:[],
  activePage:'dashboard', activeStock:null, sbTab:'all',
  workspaces:[
    {id:'ws1',name:'Morning Scan',active:true},
    {id:'ws2',name:'Intraday',active:false},
    {id:'ws3',name:'Swing',active:false},
  ],
  syncing:false, loaded:false,
};

// ── Core computations ────────────────────────────────────────────────────────
// ── Calculation Cache ────────────────────────────────────────────────────────
const Cache = {
  histories: {},
  stats: {},
  latestPrice: {},
  prevPrice: {},
  change: {},
  spark: {},
  topGainers: [],
  topLosers: [],
  autoPicks: [],
  hammers: [],
  summary: {}
};

function precomputeCache() {
  Cache.histories = {};
  Cache.stats = {};
  Cache.latestPrice = {};
  Cache.prevPrice = {};
  Cache.change = {};
  Cache.topGainers = [];
  Cache.topLosers = [];
  Cache.autoPicks = [];
  Cache.hammers = [];
  Cache.summary = { total: 0, advances: 0, declines: 0, unchanged: 0 };

  // 1. Build symbol histories
  for (let i = 0; i < S.snapshots.length; i++) {
    const snap = S.snapshots[i];
    for (const [sym, price] of Object.entries(snap.prices)) {
      if (typeof price === 'number' && isFinite(price) && price > 0) {
        if (!Cache.histories[sym]) {
          Cache.histories[sym] = [];
        }
        Cache.histories[sym].push({ ts: snap.ts, label: snap.label, price });
      }
    }
  }

  // 2. Precompute individual symbol stats
  S.symbols.forEach(sym => {
    const history = Cache.histories[sym] || [];
    if (history.length === 0) {
      Cache.latestPrice[sym] = null;
      Cache.prevPrice[sym] = null;
      Cache.change[sym] = null;
      Cache.stats[sym] = null;
      return;
    }
    
    const prices = history.map(h => h.price);
    const len = prices.length;
    const latest = prices[len - 1];
    const prev = len >= 2 ? prices[len - 2] : null;
    
    Cache.latestPrice[sym] = latest;
    Cache.prevPrice[sym] = prev;
    
    if (latest !== null && prev !== null && prev > 0) {
      const abs = latest - prev;
      const pct = abs / prev * 100;
      Cache.change[sym] = isFinite(pct) ? { abs, pct } : null;
    } else {
      Cache.change[sym] = null;
    }
    
    const hi = Math.max(...prices);
    const lo = Math.min(...prices);
    const avg = prices.reduce((a, b) => a + b, 0) / len;
    const first = prices[0];
    const rets = [];
    for (let i = 1; i < len; i++) {
      const ret = (prices[i] - prices[i - 1]) / prices[i - 1];
      if (isFinite(ret)) rets.push(ret);
    }
    const mean = rets.length ? rets.reduce((a, b) => a + b, 0) / rets.length : 0;
    const variance = rets.length ? rets.reduce((a, b) => a + (b - mean) ** 2, 0) / rets.length : 0;
    const vol = Math.sqrt(Math.max(0, variance)) * 100;
    const pctReturn = first > 0 ? (latest - first) / first * 100 : 0;
    
    Cache.stats[sym] = {
      hi, lo, avg, first, last: latest, count: len,
      pct: isFinite(pctReturn) ? pctReturn : 0,
      vol: isFinite(vol) ? vol : 0,
      prices, series: history
    };
  });

  // 3. Precompute global lists
  Cache.topGainers = S.symbols.map(s => {
    const c = Cache.change[s];
    const st = Cache.stats[s];
    return { sym: s, c, st };
  }).filter(x => x.c && x.c.pct > 0 && x.st && x.st.count >= 2).sort((a, b) => b.c.pct - a.c.pct);
  
  Cache.topLosers = S.symbols.map(s => {
    const c = Cache.change[s];
    const st = Cache.stats[s];
    return { sym: s, c, st };
  }).filter(x => x.c && x.c.pct < 0 && x.st && x.st.count >= 2).sort((a, b) => a.c.pct - b.c.pct);

  let a = 0, d = 0, u = 0;
  S.symbols.forEach(s => {
    const c = Cache.change[s];
    if (!c) u++;
    else if (c.pct > 0.01) a++;
    else if (c.pct < -0.01) d++;
    else u++;
  });
  Cache.summary = { total: S.symbols.length, advances: a, declines: d, unchanged: u };

  // autoPicks
  const picks = [];
  for (const sym of S.symbols) {
    const st = Cache.stats[sym];
    if (!st || st.count < 3 || st.prices.length < 2) continue;
    const c = Cache.change[sym];
    if (!c) continue;
    
    let score = 0, reasons = [];
    const avg = st.avg, last = st.last;
    
    if (last > avg) { score += 25; reasons.push('Above avg'); }
    if (last < avg) { score -= 10; }
    
    const rsi = calcRSI(st.prices);
    if (rsi < 35) { score += 20; reasons.push('RSI oversold'); }
    else if (rsi < 50 && last > avg) { score += 10; reasons.push('RSI rising'); }
    else if (rsi > 70) { score -= 15; }
    
    if (st.pct > 5) { score += 20; reasons.push(`+${st.pct.toFixed(1)}%`); }
    else if (st.pct > 2) { score += 10; }
    else if (st.pct < -5) { score -= 20; }
    
    if (st.vol >= 0 && st.vol < 2 && last > avg) { score += 10; reasons.push('Low vol'); }
    
    const fromLo = st.lo > 0 ? ((last - st.lo) / st.lo * 100) : 0;
    if (fromLo >= 0 && fromLo < 5) { score += 10; reasons.push('Near low'); }
    else if (fromLo > 80) { score -= 10; }
    
    if (score >= 35) picks.push({ sym, score: Math.min(100, Math.max(0, score)), reason: reasons.slice(0, 2).join(' · '), c });
  }
  Cache.autoPicks = picks.sort((a, b) => b.score - a.score);

  // hammerSignals
  const hammersList = [];
  for (const sym of S.symbols) {
    const prices = (Cache.histories[sym] || []).map(h => ({ ts: h.ts, label: h.label, price: h.price }));
    if (prices.length < 20) continue;
    
    for (let hammerIdx = 14; hammerIdx < prices.length - 1; hammerIdx++) {
      let downCount = 0;
      for (let i = hammerIdx - 14; i < hammerIdx; i++) {
        if (prices[i].price > prices[i+1].price) downCount++;
      }
      if (downCount < 13) continue;
      
      const prevPrice = hammerIdx > 0 ? prices[hammerIdx-1].price : null;
      const hammerPrice = prices[hammerIdx].price;
      const nextPrice = hammerIdx < prices.length - 1 ? prices[hammerIdx+1].price : null;
      
      if (!prevPrice || !nextPrice) continue;
      
      const open = prevPrice;
      const close = hammerPrice;
      const high = Math.max(prevPrice, hammerPrice);
      const low = Math.min(prevPrice, hammerPrice);
      
      const body = Math.abs(close-open) || (hammerPrice * 0.001);
      const upperShadow = high - Math.max(open, close);
      const lowerShadow = Math.min(open, close) - low;
      
      if (!(upperShadow < body && lowerShadow > body && lowerShadow > (body * 0.5))) continue;
      if (!(nextPrice > hammerPrice && nextPrice >= hammerPrice)) continue;
      
      const shadowRatio = lowerShadow / (upperShadow || 1);
      const bodySmallness = Math.max(0, 1 - ((body / hammerPrice) * 100 / 2));
      const strength = Math.min(100, Math.round((shadowRatio * 40) + (bodySmallness * 60)));
      
      let score = 50;
      score += (strength * 0.3);
      if ((nextPrice - hammerPrice) / hammerPrice > 0.005) score += 15;
      if (lowerShadow / high > 0.2) score += 10;
      score = Math.min(100, Math.round(score));
      
      if (score >= 50) {
        hammersList.push({
          sym,
          ts: prices[hammerIdx].ts,
          label: prices[hammerIdx].label,
          price: hammerPrice,
          entry: prevPrice,
          nextPrice,
          score,
          strength,
          reason: `15d downtrend, green confirmation`
        });
      }
    }
  }
  Cache.hammers = hammersList.sort((a, b) => b.score - a.score);
}

// ── Core computations ────────────────────────────────────────────────────────
function latestPrice(sym){
  return Cache.latestPrice[sym] !== undefined ? Cache.latestPrice[sym] : null;
}
function prevPrice(sym){
  return Cache.prevPrice[sym] !== undefined ? Cache.prevPrice[sym] : null;
}
function change(sym){
  return Cache.change[sym] !== undefined ? Cache.change[sym] : null;
}
function series(sym,period='all'){
  const history = Cache.histories[sym] || [];
  if(period==='all')return history;
  if(history.length===0)return [];
  const last=history[history.length-1].ts;
  const cut={d3:3*864e5,w1:7*864e5,m1:30*864e5,m3:90*864e5}[period];
  if(cut){const f=history.filter(s=>s.ts>=last-cut);if(f.length>=2)return f;}
  return history;
}
function stats(sym,period='all'){
  if (period === 'all') {
    return Cache.stats[sym] !== undefined ? Cache.stats[sym] : null;
  }
  const sr=series(sym,period);
  const pr=sr.map(s=>s.price);
  if(!pr.length)return null;
  const hi=Math.max(...pr),lo=Math.min(...pr),avg=pr.reduce((a,b)=>a+b,0)/pr.length;
  const first=pr[0],last=pr[pr.length-1];
  const rets=[];
  for(let i=1;i<pr.length;i++){
    const ret=(pr[i]-pr[i-1])/pr[i-1];
    if(isFinite(ret))rets.push(ret);
  }
  const mean=rets.length?rets.reduce((a,b)=>a+b,0)/rets.length:0;
  const variance=rets.length?rets.reduce((a,b)=>a+(b-mean)**2,0)/rets.length:0;
  const vol=Math.sqrt(Math.max(0,variance))*100;
  const pctReturn=first>0?(last-first)/first*100:0;
  return{hi,lo,avg,first,last,count:sr.length,pct:isFinite(pctReturn)?pctReturn:0,vol:isFinite(vol)?vol:0,prices:pr,series:sr};
}
function topGainers(n=10){
  return Cache.topGainers.slice(0,n);
}
function topLosers(n=10){
  return Cache.topLosers.slice(0,n);
}
function summary(){
  return Cache.summary;
}

// Auto picks (momentum + pattern score)
function autoPicks(n=6){
  return Cache.autoPicks.slice(0,n);
}
function calcRSI(prices,n=14){
  if(prices.length<n+1)return 50;
  const diffs=prices.slice(1).map((p,i)=>p-prices[i]);
  const recent=diffs.slice(-n);
  const gains=recent.filter(d=>d>0).reduce((a,b)=>a+b,0)/n;
  const losses=recent.filter(d=>d<0).map(d=>-d).reduce((a,b)=>a+b,0)/n;
  if(losses===0)return 100;
  return 100-100/(1+gains/losses);
}
function hammerSignals(){
  return Cache.hammers;
}

// ── Formatting ───────────────────────────────────────────────────────────────
const fp=p=>(p==null||isNaN(p))?'—':'Rs '+((+p).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}));
const fc=(c,short=false)=>!c?'—':`${c.pct>=0?'+':''}${short?c.pct.toFixed(2)+'%':c.abs.toFixed(2)+' ('+c.pct.toFixed(2)+'%)'}`;
const fago=ts=>{const d=Date.now()-ts;if(d<60000)return 'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400e3)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400e3)+'d ago';};
const fdt=ts=>ts?new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const fds=ts=>ts?new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
const cc=c=>!c?'nu':c.pct>0?'up':'dn';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

function spark(sym,w=52,h=22){
  const st=Cache.stats[sym];
  if(!st||st.count<2)return`<svg width="${w}" height="${h}"></svg>`;
  const pr=st.prices;
  const mn=st.lo,mx=st.hi,rng=mx-mn||1;
  const pts=pr.map((p,i)=>`${(i/(pr.length-1))*(w-2)+1},${h-((p-mn)/rng)*(h-4)-2}`).join(' ');
  const c=Cache.change[sym];
  const col=c?(c.pct>=0?'#00d4aa':'#f25c6e'):'#353760';
  return`<svg width="${w}" height="${h}" class="sparksvg"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

// Canvas chart
const DPR=Math.min(window.devicePixelRatio||1,2);
function drawChart(canvas,sr,sym){
  if(!canvas)return;
  const outer=canvas.parentElement;
  const W=outer?outer.clientWidth:600,H=outer?outer.clientHeight:220;
  canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(DPR,DPR);
  const pr=sr.map(s=>s.price).filter(p=>typeof p==='number'&&isFinite(p)&&p>0);
  if(pr.length<2){ctx.fillStyle='#606880';ctx.font='11px Space Mono';ctx.textAlign='center';ctx.fillText('Insufficient data',W/2,H/2);return;}
  const mn=Math.min(...pr),mx=Math.max(...pr),rng=mx-mn||mx*0.01||1;
  const pad={t:16,b:28,l:60,r:12};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const xp=i=>pad.l+(i/(pr.length-1))*cw;
  const yp=v=>pad.t+(1-(v-mn)/rng)*ch;
  // grid
  ctx.strokeStyle='#1e2030';ctx.lineWidth=1;ctx.setLineDash([2,4]);
  for(let i=0;i<=4;i++){
    const y=pad.t+(i/4)*ch;const val=mx-(i/4)*rng;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#606880';ctx.font='9px Space Mono';ctx.textAlign='right';
    ctx.fillText((val>=1000?val.toFixed(0):val.toFixed(2)),pad.l-4,y+3);
  }
  ctx.setLineDash([]);
  // x labels
  ctx.fillStyle='#606880';ctx.font='8px Space Mono';ctx.textAlign='center';
  const step=Math.max(1,Math.ceil(sr.length/Math.floor(cw/50)));
  for(let i=0;i<sr.length;i+=step){
    if(sr[i]?.ts)ctx.fillText(new Date(sr[i].ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}),xp(i),H-6);
  }
  // gradient
  const isUp=pr[pr.length-1]>=pr[0];
  const col=isUp?'#00d4aa':'#f25c6e';
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,isUp?'rgba(0,212,170,.2)':'rgba(242,92,110,.2)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(xp(0),yp(pr[0]));
  for(let i=1;i<pr.length;i++)ctx.lineTo(xp(i),yp(pr[i]));
  ctx.lineTo(xp(pr.length-1),pad.t+ch);ctx.lineTo(pad.l,pad.t+ch);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // line
  ctx.beginPath();ctx.moveTo(xp(0),yp(pr[0]));
  for(let i=1;i<pr.length;i++)ctx.lineTo(xp(i),yp(pr[i]));
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.shadowColor=col;ctx.shadowBlur=6;ctx.stroke();ctx.shadowBlur=0;
  // dot
  const lx=xp(pr.length-1),ly=yp(pr[pr.length-1]);
  ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  // tooltip data
  canvas._data={sr,pr,xp,yp,col};
}
function addChartTooltip(canvas,tipEl){
  if(!canvas||!tipEl)return;
  canvas.style.cursor='crosshair';
  canvas.onmousemove=e=>{
    const d=canvas._data;if(!d)return;
    const rect=canvas.getBoundingClientRect();const mx=e.clientX-rect.left;
    let best=0,bd=Infinity;
    d.pr.forEach((_,i)=>{const dist=Math.abs(d.xp(i)-mx);if(dist<bd){bd=dist;best=i;}});
    if(bd>50){tipEl.style.display='none';return;}
    const p=d.pr[best],prev=best>0?d.pr[best-1]:null;
    const pct=prev?((p-prev)/prev*100).toFixed(2):null;
    tipEl.style.display='block';
    tipEl.style.left=Math.min(d.xp(best)+12,canvas.offsetWidth-130)+'px';
    tipEl.style.top=Math.max(0,d.yp(p)-50)+'px';
    tipEl.innerHTML=`<div style="font-size:9px;color:var(--t3);margin-bottom:3px">${d.sr[best]?.label||fdt(d.sr[best]?.ts)}</div>
    <div style="font-family:var(--display);font-size:14px;font-weight:700;color:${d.col}">${fp(p)}</div>
    ${pct?`<div style="font-size:10px;color:${+pct>=0?'var(--green)':'var(--red)'}">${+pct>=0?'+':''}${pct}%</div>`:''}`;
  };
  canvas.onmouseleave=()=>{tipEl.style.display='none';};
}

// Distribution bars
function distBar(el,prices){
  if(!el||!prices||prices.length<3){if(el)el.innerHTML='<span style="color:var(--t3);font-size:10px">Not enough data</span>';return;}
  const mn=Math.min(...prices),mx=Math.max(...prices),rng=mx-mn||1;
  const B=12,counts=new Array(B).fill(0);
  prices.forEach(p=>{const b=Math.min(B-1,Math.floor((p-mn)/rng*B));counts[b]++;});
  const mc=Math.max(...counts)||1;
  el.innerHTML='<div style="display:flex;align-items:flex-end;gap:2px;height:50px">'+
    counts.map((c,i)=>`<div style="flex:1;height:${Math.max(3,Math.round(c/mc*46))}px;background:hsl(${160+i*4},65%,48%);border-radius:2px 2px 0 0" title="${c}"></div>`).join('')+'</div>';
}

async function fetchData(){
  const r=await fetch(`${API}/api/data`);
  if(!r.ok)throw new Error('Data fetch failed: '+r.status);
  return r.json();
}
async function saveUserData(){
  // Update local cache
  try {
    const cached = JSON.parse(localStorage.getItem('marketai_cache') || '{}');
    cached.portfolio = S.portfolio;
    cached.watchlists = S.watchlists;
    cached.watchlistItems = S.watchlistItems;
    cached.alerts = S.alerts;
    cached.screeners = S.screeners;
    localStorage.setItem('marketai_cache', JSON.stringify(cached));
  } catch(e) {}

  await fetch(`${API}/api/data`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({portfolio:S.portfolio,watchlists:S.watchlists,watchlistItems:S.watchlistItems,alerts:S.alerts,screeners:S.screeners})});
}

async function doSync(silent=false){
  if(S.syncing)return;
  S.syncing=true;
  const btn=document.getElementById('syncBtn');
  if(btn){btn.disabled=true;btn.textContent='Syncing...';}
  setSyncState('spin','Syncing...');
  setLoad(30);
  try{
    const r=await fetch(`${API}/api/sync`,{method:'POST'});
    const j=await r.json();
    setLoad(70);
    if(!j.ok)throw new Error(j.error||'Sync failed');
    // reload data from pool
    const d=await fetchData();
    mergeData(d);
    setLoad(100);
    setSyncState('ok',`Synced ${fago(S.lastSync)} · ${S.snapshots.length} snaps`);
    if(!silent)toast(`Synced ${j.snapshotsAdded} new snapshots · ${S.symbols.length} symbols`,'ok');
    renderAll();
  }catch(e){
    setSyncState('err','Sync failed');
    if(!silent)toast(e.message,'err');
  }finally{
    S.syncing=false;
    if(btn){btn.disabled=false;btn.textContent='Sync';}
    setTimeout(()=>setLoad(0),600);
  }
}

function mergeData(d){
  if(d.snapshots)S.snapshots=d.snapshots.sort((a,b)=>a.ts-b.ts);
  if(d.symbols)S.symbols=d.symbols;
  if(d.lastSync)S.lastSync=d.lastSync;
  if(d.portfolio)S.portfolio=d.portfolio;
  if(d.watchlists)S.watchlists=d.watchlists;
  if(d.watchlistItems)S.watchlistItems=d.watchlistItems;
  if(d.alerts)S.alerts=d.alerts;
  if(d.screeners)S.screeners=d.screeners;
  precomputeCache();

  // Save to localStorage
  try {
    localStorage.setItem('marketai_cache', JSON.stringify({
      snapshots: S.snapshots,
      symbols: S.symbols,
      lastSync: S.lastSync,
      portfolio: S.portfolio,
      watchlists: S.watchlists,
      watchlistItems: S.watchlistItems,
      alerts: S.alerts,
      screeners: S.screeners
    }));
  } catch(e) {
    console.warn('Failed to save to localStorage:', e);
  }
}

// ── Groq AI ──────────────────────────────────────────────────────────────────
async function askGroq(prompt,context=''){
  const messages=[
    {role:'system',content:`You are MarketAI, a professional NSE stock market analyst. Be concise, data-driven, and use numbers. Context: ${context}`},
    {role:'user',content:prompt}
  ];
  const r=await fetch(`${API}/api/groq`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages,max_tokens:400})});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'Groq unavailable');
  return j.text;
}

Pages.stocks=function(el){
  let sort='sym',dir=1,q='',tab='all';
  function render(){
    let syms=[...S.symbols].filter(s=>{const st=stats(s);return st&&st.count>=2;});
    if(q)syms=syms.filter(s=>s.includes(q.toUpperCase()));
    if(tab==='gain')syms=syms.filter(s=>{const c=change(s);return c&&c.pct>0.01;});
    if(tab==='loss')syms=syms.filter(s=>{const c=change(s);return c&&c.pct<-0.01;});
    syms.sort((a,b)=>{
      let va,vb;
      if(sort==='sym'){va=a;vb=b;}
      else if(sort==='price'){va=latestPrice(a)||0;vb=latestPrice(b)||0;}
      else if(sort==='chg'){va=change(a)?.pct||0;vb=change(b)?.pct||0;}
      else if(sort==='snaps'){va=series(a).length;vb=series(b).length;}
      if(typeof va==='string')return va.localeCompare(vb)*dir;
      return(va-vb)*dir;
    });
    const arr=dir===1?'&#x2191;':'&#x2193;';
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Stocks</div><div class="page-sub">${syms.length} of ${S.symbols.length} symbols (${S.symbols.length-syms.length} with insufficient data) — ${S.activeExchange||'NSE'}</div></div>

          ${['all','gain','loss'].map(t=>`<button class="sb-tab${tab===t?' active':''}" onclick="stTab('${t}',this)">${t==='all'?'All':t==='gain'?'Gainers':'Losers'}</button>`).join('')}

      </div>
    </div>
    <div style="flex:1;overflow:auto">
      ${!syms.length?`<div class="empty"><div class="empty-title">${S.symbols.length?'No matches':'No data'}</div><div class="empty-sub">${S.symbols.length?'Try a different filter':'Click Sync to load market data'}</div></div>`:`
      <div class="tbl-wrap" style="margin:0"><table>
        <thead><tr>
          <th onclick="stSort('sym')" style="cursor:pointer">Symbol${sort==='sym'?arr:''}</th>
          <th>Sparkline</th>
          <th onclick="stSort('price')" style="cursor:pointer">Price${sort==='price'?arr:''}</th>
          <th onclick="stSort('chg')" style="cursor:pointer">Change${sort==='chg'?arr:''}</th>
          <th>High</th><th>Low</th>
          <th onclick="stSort('snaps')" style="cursor:pointer">Snaps${sort==='snaps'?arr:''}</th>
          <th>Action</th>
        </tr></thead>
        <tbody>${syms.map(sym=>{
          const p=latestPrice(sym),c=change(sym),cls=cc(c),st=stats(sym);
          return`<tr onclick="openStock('${sym}')" style="cursor:pointer">
            <td class="td-sym">${sym}</td>
            <td>${spark(sym,56,20)}</td>
            <td class="${cls}" style="font-family:var(--display);font-weight:700">${fp(p)}</td>
            <td class="${cls}" style="font-weight:700">${c?fc(c,true):'—'}</td>
            <td class="up" style="font-size:11px">${st?fp(st.hi):'—'}</td>
            <td class="dn" style="font-size:11px">${st?fp(st.lo):'—'}</td>
            <td style="color:var(--t3)">${st?st.count:'—'}</td>
            <td onclick="event.stopPropagation()">
              <button class="btn btn-sm btn-ghost" onclick="openStock('${sym}')">View</button>
            </td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>`}
    </div>`;
    window.stSearch=v=>{q=v;render();};
    window.stTab=(t,btn)=>{tab=t;render();};
    window.stSort=col=>{if(sort===col)dir*=-1;else{sort=col;dir=col==='sym'?1:-1;}render();};
  }
  render();

};

  if(!sym){el.innerHTML=`<div class="empty"><div class="empty-title">No symbol selected</div></div>`;return;}
  S.activeStock=sym;
  let period='all';

  function render(){
    const sr=series(sym,period);
    const p=latestPrice(sym),c=change(sym),cls=cc(c),st=stats(sym,period);
    const rsi=st?calcRSI(st.prices):null;
    el.innerHTML=`
    <div class="detail-hdr">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <button class="btn btn-sm btn-ghost" onclick="nav('stocks')">Back</button>
          <div class="detail-sym">${sym}</div>
          <span class="badge badge-n">NSE</span>
          ${sr.length?`<span class="badge badge-n">${sr.length} snapshots</span>`:''}
          ${st?`<span class="badge badge-n">Vol ${st.vol.toFixed(1)}%</span>`:''}
        </div>
        <div class="detail-meta">
          ${sr.length?`<div class="meta-tag">Since ${fds(sr[0].ts)}</div>`:''}
          ${st?`<div class="meta-tag">Avg ${fp(st.avg)}</div>`:''}
        </div>
      </div>
      <div class="detail-price">
        <div class="dp-main ${cls}">${fp(p)}</div>
        <div class="dp-chg ${cls}">${c?fc(c):'—'}</div>
        <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-sm btn-ghost" onclick="addToPortfolio('${sym}')">Portfolio</button>
          <button class="btn btn-sm btn-ghost" onclick="addToWatchlist('${sym}')">Watchlist</button>
        </div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-left">
        <!-- Chart -->
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:700">Price History</div>
            <div class="period-row">
              ${['all','m3','m1','w1','d3'].map(pp=>`<button class="prd${period===pp?' active':''}" onclick="setPrd('${pp}',this)">${pp==='all'?'All':pp.toUpperCase()}</button>`).join('')}
            </div>
          </div>
          <div class="chart-outer" style="height:220px">
            <canvas id="mc" style="display:block;width:100%;height:100%"></canvas>
            <div class="chart-tip" id="ct"></div>
          </div>
        </div>
        <!-- Mini stats -->
        ${st?`<div class="mini-stat-grid">
          ${[['Latest',fp(st.last),cls],['High',fp(st.hi),'up'],['Low',fp(st.lo),'dn'],['Avg',fp(st.avg),''],['Return',(st.pct>=0?'+':'')+st.pct.toFixed(2)+'%',st.pct>=0?'up':'dn'],['Snaps',st.count+'','']].map(([l,v,c])=>`
          <div class="ms"><div class="ms-lbl">${l}</div><div class="ms-val ${c}">${v}</div></div>`).join('')}
        </div>`:''}
        <div class="sec-line"></div><button class="btn btn-sm btn-ghost" onclick="loadStockAI('${sym}')">Refresh</button></div>
          <div class="ai-box" id="stockAI"><div class="ai-spinner"><div class="spin-ring"></div>Loading analysis...</div></div>
        </div>
        <!-- Price log -->
        <div>
          <div class="sec-hdr"><div class="sec-title">Price Log</div><div class="sec-line"></div><div class="sec-count">${sr.length} entries</div></div>
          <div class="tbl-wrap"><table>
            <thead><tr><th>#</th><th>Snapshot</th><th>Price (Rs)</th><th>Change</th><th>Change %</th></tr></thead>
            <tbody>${[...sr].reverse().map((snap,i,arr)=>{
              const pp=snap.prices[sym];if(!pp)return'';
              const pv=arr[i+1]?.prices[sym];
              const d=pv?pp-pv:null;const pct=pv?d/pv*100:null;const cc2=d!=null?(d>=0?'up':'dn'):'nu';
              return`<tr><td style="color:var(--t3);font-size:9px">${sr.length-i}</td>
              <td style="font-size:10px">${snap.label||fdt(snap.ts)}</td>
              <td style="font-family:var(--display);font-weight:700">${fp(pp)}</td>
              <td class="${cc2}">${d!=null?(d>=0?'+':'')+d.toFixed(2):'—'}</td>
              <td>${pct!=null?`<span class="badge ${pct>=0?'badge-g':'badge-r'}">${pct>=0?'+':''}${pct.toFixed(2)}%</span>`:'—'}</td></tr>`;}).join('')}
            </tbody>
          </table></div>
        </div>
      </div>
      <!-- Right panel -->
      <div class="detail-right">
        <div class="card card-sm">
          <div class="card-title" style="margin-bottom:10px">Statistics</div>
          <div class="info-rows">${st?[
            ['Snapshots',st.count],['High',`<span class="up">${fp(st.hi)}</span>`],['Low',`<span class="dn">${fp(st.lo)}</span>`],
            ['Average',fp(st.avg)],['Return',`<span class="${st.pct>=0?'up':'dn'}">${st.pct>=0?'+':''}${st.pct.toFixed(2)}%</span>`],
            ['Volatility',st.vol.toFixed(2)+'%'],['RSI(14)',rsi?`<span style="color:${rsi>70?'var(--red)':rsi<30?'var(--green)':'var(--t2)'}">${rsi.toFixed(1)}</span>`:'—'],
            ['First Seen',st.series.length?fds(st.series[0].ts):'—'],
          ].map(([k,v])=>`<div class="ir"><span class="ir-key">${k}</span><span class="ir-val">${v}</span></div>`).join(''):'<div style="color:var(--t3);font-size:11px">No data</div>'}</div>
        </div>
        <div class="card card-sm">
          <div class="card-title" style="margin-bottom:10px">Distribution</div>
          <div id="distEl"></div>
          <div style="font-size:9px;color:var(--t3);margin-top:6px;text-align:center">Price across snapshots</div>
        </div>
        <div class="card card-sm">
          <div class="card-title" style="margin-bottom:8px">In Watchlists</div>
          ${(()=>{const wls=S.watchlists.filter(wl=>S.watchlistItems.find(i=>i.sym===sym&&i.wlId===wl.id));
            return wls.length?wls.map(wl=>`<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--b1)">${wl.name}</div>`).join('')
            :'<div style="color:var(--t3);font-size:11px">Not in any watchlist</div>';})()}
          <button class="btn btn-sm btn-ghost" style="margin-top:8px;width:100%" onclick="addToWatchlist('${sym}')">Add to Watchlist</button>
        </div>
      </div>
    </div>`;

    // Draw chart
    requestAnimationFrame(()=>{
      const canvas=document.getElementById('mc');
      if(canvas)drawChart(canvas,sr,sym);
      addChartTooltip(canvas,document.getElementById('ct'));
      distBar(document.getElementById('distEl'),st?.prices);
      loadStockAI(sym);
    });

    window.setPrd=(pp,btn)=>{period=pp;render();};
  }

  window.loadStockAI=async function(s){
    const el=document.getElementById('stockAI');if(!el)return;
    const st=stats(s);if(!st){el.innerHTML='Not enough data for analysis.';return;}
    const c=change(s);
    el.innerHTML='<div class="ai-spinner"><div class="spin-ring"></div>Analyzing...</div>';
    try{
      const ctx=`Stock: ${s}, Price: ${fp(latestPrice(s))}, Change: ${c?fc(c):'none'}, Period return: ${st.pct.toFixed(2)}%, High: ${fp(st.hi)}, Low: ${fp(st.lo)}, Avg: ${fp(st.avg)}, Volatility: ${st.vol.toFixed(2)}%, RSI: ${calcRSI(st.prices).toFixed(1)}, Snapshots: ${st.count}`;
      const text=await askGroq(`Analyze this NSE stock and give 3 bullet points: trend assessment, key levels (support/resistance), and trading outlook.`,ctx);
      el.innerHTML=text;
    }catch(e){el.innerHTML='AI analysis unavailable (GROQ_API_KEY needed).';}
  };

  render();
};

// ── PATTERNS ─────────────────────────────────────────────────────────────────
Pages.patterns=function(el){
  let filterType='all',filterStatus='all',minScore=0,q='';
  function render(){
    let pats=getAllPatterns();
    if(filterType!=='all')pats=pats.filter(p=>p.type===filterType);
    if(minScore>0)pats=pats.filter(p=>p.score>=minScore);
    if(q)pats=pats.filter(p=>p.sym.includes(q.toUpperCase()));
    const typeMap={hammer:'badge-g',doji:'badge-y',engulfing:'badge-b',morning_star:'badge-p'};
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Pattern Analysis</div><div class="page-sub">${pats.length} patterns detected</div></div>
    </div>
    <div style="padding:10px 18px;border-bottom:1px solid var(--b1);background:var(--s1);display:flex;gap:10px;flex-wrap:wrap;align-items:center;flex-shrink:0">
      <input placeholder="Symbol..." oninput="patQ(this.value)" style="font-size:11px;padding:5px 9px;width:130px">
      <select onchange="patType(this.value)" style="font-size:11px;padding:5px 9px">
        <option value="all">All Patterns</option>
        ${['hammer','doji','engulfing','morning_star'].map(t=>`<option value="${t}">${t.replace(/_/g,' ')}</option>`).join('')}
      </select>
      <div style="display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t3)">Min Score:
        <input type="range" min="0" max="100" value="${minScore}" oninput="patScore(+this.value)" style="width:80px">
        <span id="scoreV" style="color:var(--accent);font-weight:700">${minScore}</span>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="patReset()">Reset</button>
    </div>
    <div style="flex:1;overflow:auto">
      ${!pats.length?`<div class="empty"><div class="empty-title">No patterns</div><div class="empty-sub">${S.symbols.length?'Try adjusting filters or sync more data':'Sync data first'}</div></div>`:`
      <div class="tbl-wrap" style="margin:0"><table>
        <thead><tr><th>Symbol</th><th>Pattern</th><th>Detected</th><th>Score</th><th>Strength</th><th>Vol Spike</th></tr></thead>
        <tbody>${pats.map(p=>`<tr onclick="openStock('${p.sym}')" style="cursor:pointer">
          <td class="td-sym">${p.sym}</td>
          <td><span class="badge ${typeMap[p.type]||'badge-n'}">${p.type.replace(/_/g,' ')}</span></td>
          <td style="color:var(--t3);font-size:10px">${p.label||fds(p.ts)}</td>
          <td><span class="${p.score>=70?'up':p.score>=40?'':'dn'}" style="font-weight:700">${p.score}</span></td>
          <td style="width:90px">${sbar(p.score)}</td>
          <td>${p.volSpike?'<span class="up" style="font-weight:700;font-size:10px">Yes</span>':'<span style="color:var(--t3)">—</span>'}</td>
        </tr>`).join('')}
        </tbody>
      </table></div>`}
    </div>`;
    window.patQ=v=>{q=v;render();};
    window.patType=v=>{filterType=v;render();};
    window.patScore=v=>{minScore=v;document.getElementById('scoreV').textContent=v;render();};
    window.patReset=()=>{filterType='all';filterStatus='all';minScore=0;q='';render();};
  }
  render();
};

function getAllPatterns(){
  const out=[];
  for(const sym of S.symbols){
    const sr=series(sym);
    const pr=sr.map(s=>s.prices[sym]).filter(p=>typeof p==='number'&&isFinite(p)&&p>0);
    if(pr.length<3)continue;
    
    for(let i=2;i<pr.length;i++){
      const [a,b,cur]=[pr[i-2],pr[i-1],pr[i]];
      if(!isFinite(a)||!isFinite(b)||!isFinite(cur)||a<=0||b<=0||cur<=0)continue;
      
      const body=Math.abs(cur-b);
      const rng=Math.max(a,b,cur)-Math.min(a,b,cur)||1;
      
      // Hammer: prior high > dip, recovery above dip
      if(a>b&&cur>b&&(cur-b)/(a-b||1)>0.5){
        const score=Math.min(100,Math.round(((cur-b)/(a-b||1))*70));
        if(score>=40)out.push({sym,type:'hammer',ts:sr[i].ts,label:sr[i].label,score,volSpike:score>=60});
      }
      
      // Doji: small body relative to range
      if(body/rng<0.1&&rng>0&&a>b*0.99&&a<b*1.01){
        out.push({sym,type:'doji',ts:sr[i].ts,label:sr[i].label,score:50,volSpike:false});
      }
      
      // Engulfing: large move opposite to prior move
      if(i>=2&&Math.abs(cur-b)>Math.abs(b-a)*1.4&&(cur-b)*(b-a)<0){
        const absSize=(cur-b)/(b-a||1);
        const score=Math.min(100,Math.round(Math.abs(absSize)*65));
        if(score>=50)out.push({sym,type:'engulfing',ts:sr[i].ts,label:sr[i].label,score,volSpike:score>=70});
      }
    }
    
    // Morning star: low, recovery, strong follow-through
    for(let i=3;i<pr.length;i++){
      const [a,b,c,d]=[pr[i-3],pr[i-2],pr[i-1],pr[i]];
      if(!isFinite(a)||!isFinite(b)||!isFinite(c)||!isFinite(d)||a<=0||b<=0||c<=0||d<=0)continue;
      
      if(a>b&&c>b&&d>a*0.98&&d>c&&Math.abs(b-a)/a<0.03){
        out.push({sym,type:'morning_star',ts:sr[i].ts,label:sr[i].label,score:75,volSpike:true});
      }
    }
  }
  return out.sort((a,b)=>b.ts-a.ts).slice(0,100);
}

// ── SCREENER ─────────────────────────────────────────────────────────────────
Pages.screener=function(el){
  let filters={minP:0,maxP:Infinity,minSnaps:0,minRet:-Infinity,maxRet:Infinity,trend:'all',minVol:0,maxVol:Infinity};
  function applyFilters(){
    return S.symbols.filter(sym=>{
      const p=latestPrice(sym);const st=stats(sym);const c=change(sym);
      if(!p||!st)return false;
      if(p<filters.minP||p>filters.maxP)return false;
      if(st.count<filters.minSnaps)return false;
      if(st.pct<filters.minRet||st.pct>filters.maxRet)return false;
      if(st.vol<filters.minVol||st.vol>filters.maxVol)return false;
      if(filters.trend==='up'&&(!c||c.pct<=0))return false;
      if(filters.trend==='dn'&&(!c||c.pct>=0))return false;
      return true;
    });
  }
  function render(){
    const res=applyFilters();
    el.innerHTML=`
    <div style="display:flex;height:100%;overflow:hidden">
      <div class="sidebar" style="width:240px">
        <div class="sb-hdr"><div class="sb-title">Filters</div>
          <button class="btn btn-sm btn-ghost" onclick="scrReset()" style="width:100%;margin-top:4px">Reset All</button>
        </div>
        <div class="sb-list" style="padding:14px;display:flex;flex-direction:column;gap:12px">
          <div><label class="form-lbl">Price (Rs)</label>
            <div class="form-row">
              <input type="number" placeholder="Min" oninput="sf('minP',+this.value||0)" style="font-size:11px">
              <input type="number" placeholder="Max" oninput="sf('maxP',+this.value||Infinity)" style="font-size:11px">
            </div>
          </div>
          <div><label class="form-lbl">Min Snapshots</label>
            <input type="number" min="0" value="${filters.minSnaps}" oninput="sf('minSnaps',+this.value)" style="width:100%;font-size:11px">
          </div>
          <div><label class="form-lbl">Return % Range</label>
            <div class="form-row">
              <input type="number" placeholder="Min %" oninput="sf('minRet',+this.value||-Infinity)" style="font-size:11px">
              <input type="number" placeholder="Max %" oninput="sf('maxRet',+this.value||Infinity)" style="font-size:11px">
            </div>
          </div>
          <div><label class="form-lbl">Volatility %</label>
            <div class="form-row">
              <input type="number" placeholder="Min" oninput="sf('minVol',+this.value||0)" style="font-size:11px">
              <input type="number" placeholder="Max" oninput="sf('maxVol',+this.value||Infinity)" style="font-size:11px">
            </div>
          </div>
          <div><label class="form-lbl">Trend</label>
            <select onchange="sf('trend',this.value)" style="width:100%;font-size:11px">
              <option value="all">Any</option><option value="up">Upward</option><option value="dn">Downward</option>
            </select>
          </div>
          <hr style="border-color:var(--b1)">
          <button class="btn btn-primary btn-sm" onclick="scrSave()">Save Screener</button>
          ${S.screeners.length?`<div><div class="sb-title" style="margin-bottom:6px">Saved</div>
            ${S.screeners.map(s=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--b1)">
              <div style="flex:1;font-size:11px;cursor:pointer" onclick="scrLoad('${s.id}')">${s.name}</div>
              <button class="btn btn-sm btn-ghost" onclick="scrDel('${s.id}')">Del</button>
            </div>`).join('')}
          </div>`:''}
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="page-hdr"><div><div class="page-title">Screener Results</div><div class="page-sub">${res.length} stocks match</div></div></div>
        <div style="flex:1;overflow:auto">
          ${!res.length?`<div class="empty"><div class="empty-title">No matches</div><div class="empty-sub">Relax filters or sync more data</div></div>`:`
          <div class="tbl-wrap" style="margin:0"><table>
            <thead><tr><th>Symbol</th><th>Sparkline</th><th>Price</th><th>Change</th><th>Return %</th><th>Volatility</th><th>Snaps</th><th></th></tr></thead>
            <tbody>${res.map(sym=>{
              const p=latestPrice(sym),c=change(sym),st=stats(sym),cls=cc(c);
              return`<tr onclick="openStock('${sym}')" style="cursor:pointer">
                <td class="td-sym">${sym}</td><td>${spark(sym,56,20)}</td>
                <td class="${cls}" style="font-weight:700;font-family:var(--display)">${fp(p)}</td>
                <td class="${cls}" style="font-weight:700">${c?fc(c,true):'—'}</td>
                <td class="${st&&st.pct>=0?'up':'dn'}">${st?(st.pct>=0?'+':'')+st.pct.toFixed(2)+'%':'—'}</td>
                <td style="color:var(--t3)">${st?st.vol.toFixed(2)+'%':'—'}</td>
                <td style="color:var(--t3)">${st?st.count:'—'}</td>
                <td><button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openStock('${sym}')">View</button></td>
              </tr>`;}).join('')}
            </tbody>
          </table></div>`}
        </div>
      </div>
    </div>`;
    window.sf=(k,v)=>{filters[k]=v;render();};
    window.scrReset=()=>{filters={minP:0,maxP:Infinity,minSnaps:0,minRet:-Infinity,maxRet:Infinity,trend:'all',minVol:0,maxVol:Infinity};render();};
    window.scrSave=()=>showModal('Save Screener',`<div class="form-grp"><label class="form-lbl">Name</label><input class="form-inp" id="scrName" placeholder="e.g. High Momentum"></div>`,
      `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" onclick="doScrSave()">Save</button>`);
    window.doScrSave=async()=>{const n=document.getElementById('scrName')?.value?.trim();if(!n)return;S.screeners.push({id:'scr'+uid(),name:n,filters:{...filters}});await saveUserData();closeModal();toast('Screener saved');render();};
    window.scrLoad=id=>{const s=S.screeners.find(x=>x.id===id);if(s){filters={...filters,...s.filters};render();}};
    window.scrDel=async id=>{S.screeners=S.screeners.filter(x=>x.id!==id);await saveUserData();render();};
  }
  render();
};

// ── PORTFOLIO ────────────────────────────────────────────────────────────────
Pages.portfolio=function(el){
  function calcPL(e){const cur=latestPrice(e.sym);if(!cur)return null;const inv=e.qty*e.avgBuy;const curV=e.qty*cur;const pl=curV-inv;return{cur,inv,curV,pl,plPct:pl/inv*100};}
  function render(){
    const allPL=S.portfolio.map(e=>({...e,pl:calcPL(e)}));
    const totInv=allPL.reduce((a,e)=>a+(e.pl?.inv||0),0);
    const totCur=allPL.reduce((a,e)=>a+(e.pl?.curV||0),0);
    const totPL=totCur-totInv;
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Portfolio</div><div class="page-sub">${S.portfolio.length} positions</div></div>
      <button class="btn btn-primary" onclick="addPosMdl()">+ Add Position</button>
    </div>
    <div class="page-body">
      ${!S.portfolio.length?`<div class="empty"><div class="empty-title">No positions</div><div class="empty-sub">Add stocks to track unrealised P&L</div><button class="btn btn-primary" style="margin-top:10px" onclick="addPosMdl()">+ Add Position</button></div>`:`
      <div class="kpis" style="margin-bottom:18px">
        <div class="kpi"><div class="kpi-lbl">Invested</div><div class="kpi-val">${totInv>=1e7?'Rs '+(totInv/1e7).toFixed(2)+'Cr':fp(totInv)}</div></div>
        <div class="kpi ${totPL>=0?'ka':'kr'}"><div class="kpi-lbl">Current Value</div><div class="kpi-val ${totPL>=0?'up':'dn'}">${totCur>=1e7?'Rs '+(totCur/1e7).toFixed(2)+'Cr':fp(totCur)}</div></div>
        <div class="kpi ${totPL>=0?'ka':'kr'}"><div class="kpi-lbl">Total P&L</div><div class="kpi-val ${totPL>=0?'up':'dn'}">${fp(totPL)}</div></div>
        <div class="kpi ${totPL>=0?'ka':'kr'}"><div class="kpi-lbl">Return</div><div class="kpi-val ${totPL>=0?'up':'dn'}">${totInv?(totPL>=0?'+':'')+((totPL/totInv)*100).toFixed(2)+'%':'—'}</div></div>
        <div class="kpi"><div class="kpi-lbl">Positions</div><div class="kpi-val">${S.portfolio.length}</div></div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Symbol</th><th>Qty</th><th>Avg Buy</th><th>Current</th><th>Invested</th><th>Value</th><th>P&L</th><th>P&L %</th><th>Date</th><th></th></tr></thead>
        <tbody>${allPL.map(e=>{const cls=e.pl&&e.pl.pl>=0?'up':'dn';return`<tr>
          <td class="td-sym" onclick="openStock('${e.sym}')" style="cursor:pointer">${e.sym}</td>
          <td>${e.qty.toLocaleString()}</td><td>${fp(e.avgBuy)}</td>
          <td class="${cls}">${e.pl?fp(e.pl.cur):'—'}</td>
          <td>${fp(e.qty*e.avgBuy)}</td>
          <td>${e.pl?fp(e.pl.curV):'—'}</td>
          <td class="${cls}" style="font-weight:700">${e.pl?fp(e.pl.pl):'—'}</td>
          <td><span class="badge ${e.pl&&e.pl.plPct>=0?'badge-g':'badge-r'}">${e.pl?(e.pl.plPct>=0?'+':'')+e.pl.plPct.toFixed(2)+'%':'—'}</span></td>
          <td style="font-size:10px;color:var(--t3)">${e.date||'—'}</td>

        </tr>`;}).join('')}
        </tbody>
      </table></div>`}

    window.delPos=async id=>{if(!confirm('Remove position?'))return;S.portfolio=S.portfolio.filter(e=>e.id!==id);await saveUserData();render();toast('Position removed');};
  }
  render();
};

// ── WATCHLISTS ───────────────────────────────────────────────────────────────
Pages.watchlists=function(el,params={}){
  let activeWL=params.wlId?S.watchlists.find(w=>w.id===params.wlId):S.watchlists[0];
  function render(){
    const items=activeWL?S.watchlistItems.filter(i=>i.wlId===activeWL.id):[];
    el.innerHTML=`
    <div style="display:flex;height:100%;overflow:hidden">
      <div class="sidebar">
        <div class="sb-hdr"><div class="sb-title">Watchlists</div>
          <button class="btn btn-primary btn-sm" onclick="createWLModal()" style="width:100%;margin-top:4px">+ New List</button>
        </div>
        <div class="sb-list">
          ${S.watchlists.map(wl=>{const cnt=S.watchlistItems.filter(i=>i.wlId===wl.id).length;return`
          <div class="si${activeWL?.id===wl.id?' active':''}" onclick="selWL('${wl.id}')">
            <div class="si-info"><div class="si-sym">${wl.name}</div><div class="si-chg nu">${cnt} stocks</div></div>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delWL('${wl.id}')">Del</button>
          </div>`;}).join('')||'<div style="padding:16px;color:var(--t3);font-size:11px;text-align:center">No watchlists yet</div>'}
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        ${activeWL?`
        <div class="page-hdr">
          <div><div class="page-title">${activeWL.name}</div><div class="page-sub">${items.length} stocks</div></div>
          <button class="btn btn-ghost" onclick="addToWLMdl('${activeWL.id}')">+ Add Stock</button>
        </div>
        <div style="flex:1;overflow:auto">
          ${!items.length?`<div class="empty"><div class="empty-title">Empty watchlist</div><div class="empty-sub">Add stocks to monitor</div><button class="btn btn-primary" style="margin-top:10px" onclick="addToWLMdl('${activeWL.id}')">+ Add Stock</button></div>`:`
          <div class="tbl-wrap" style="margin:0"><table>
            <thead><tr><th>Symbol</th><th>Sparkline</th><th>Price</th><th>Change</th><th>High</th><th>Low</th><th>Added</th><th></th></tr></thead>
            <tbody>${items.map(item=>{
              const p=latestPrice(item.sym),c=change(item.sym),st=stats(item.sym),cls=cc(c);
              return`<tr onclick="openStock('${item.sym}')" style="cursor:pointer">
                <td class="td-sym">${item.sym}</td><td>${spark(item.sym,56,20)}</td>
                <td class="${cls}" style="font-weight:700;font-family:var(--display)">${fp(p)}</td>
                <td class="${cls}" style="font-weight:700">${c?fc(c,true):'—'}</td>
                <td class="up">${st?fp(st.hi):'—'}</td><td class="dn">${st?fp(st.lo):'—'}</td>
                <td style="font-size:10px;color:var(--t3)">${item.addedAt?new Date(item.addedAt).toLocaleDateString('en-IN'):'—'}</td>
                <td onclick="event.stopPropagation()"><button class="btn btn-sm btn-danger" onclick="delWLItem('${item.id}')">Del</button></td>
              </tr>`;}).join('')}
            </tbody>
          </table></div>`}
        </div>`:
        `<div class="empty"><div class="empty-title">Select a watchlist</div><div class="empty-sub">Or create a new one</div><button class="btn btn-primary" style="margin-top:10px" onclick="createWLModal()">Create Watchlist</button></div>`}
      </div>
    </div>`;
    window.selWL=id=>{activeWL=S.watchlists.find(w=>w.id===id);render();};
    window.delWLItem=async id=>{S.watchlistItems=S.watchlistItems.filter(i=>i.id!==id);await saveUserData();render();};
    window.delWL=async id=>{if(!confirm('Delete watchlist?'))return;S.watchlists=S.watchlists.filter(w=>w.id!==id);S.watchlistItems=S.watchlistItems.filter(i=>i.wlId!==id);if(activeWL?.id===id)activeWL=S.watchlists[0];await saveUserData();render();toast('Watchlist deleted');};

// ── ALERTS ───────────────────────────────────────────────────────────────────
Pages.alerts=function(el){
  function checkAlert(a){const cur=latestPrice(a.sym);if(!cur)return false;return(a.cond==='above'&&cur>=a.target)||(a.cond==='below'&&cur<=a.target);}
  function render(){
    const triggered=S.alerts.filter(a=>a.active&&checkAlert(a));
    el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">Price Alerts</div><div class="page-sub">${S.alerts.filter(a=>a.active).length} active${triggered.length?` · ${triggered.length} triggered`:''}</div></div>
      <button class="btn btn-primary" onclick="createAlertMdl()">+ New Alert</button>
    </div>
    ${triggered.length?`<div style="padding:10px 18px;border-bottom:1px solid var(--b1);background:rgba(0,212,170,.05);display:flex;gap:10px;flex-wrap:wrap">
      ${triggered.map(a=>`<div style="background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.25);border-radius:var(--r8);padding:9px 13px">
        <div style="font-family:var(--display);font-size:13px;font-weight:800;color:var(--green)">${a.sym}</div>
        <div style="font-size:10px;color:var(--t3)">${a.cond} Rs ${a.target.toFixed(2)}</div>
        <div style="font-size:12px;font-weight:700;color:var(--green)">${fp(latestPrice(a.sym))}</div>
      </div>`).join('')}
    </div>`:''}
    <div style="flex:1;overflow:auto">
      ${!S.alerts.length?`<div class="empty"><div class="empty-title">No alerts</div><div class="empty-sub">Get notified when stocks cross your target price</div><button class="btn btn-primary" style="margin-top:10px" onclick="createAlertMdl()">+ New Alert</button></div>`:`
      <div class="tbl-wrap" style="margin:0"><table>
        <thead><tr><th>Symbol</th><th>Condition</th><th>Target</th><th>Current</th><th>Distance</th><th>Status</th><th></th></tr></thead>
        <tbody>${S.alerts.map(a=>{
          const cur=latestPrice(a.sym);const trig=checkAlert(a);
          const dist=cur?((cur-a.target)/a.target*100).toFixed(2):null;
          return`<tr>
            <td class="td-sym" onclick="openStock('${a.sym}')" style="cursor:pointer">${a.sym}</td>
            <td style="text-transform:capitalize;color:var(--t3)">${a.cond}</td>
            <td style="font-weight:700">Rs ${a.target.toFixed(2)}</td>
            <td class="${trig?'up':'nu'}">${fp(cur)}</td>
            <td style="font-size:10px">${dist!=null?`<span class="${+dist>=0?'up':'dn'}">${+dist>=0?'+':''}${dist}%</span>`:'—'}</td>
            <td>${trig?'<span class="badge badge-g">Triggered</span>':a.active?'<span class="badge badge-y">Watching</span>':'<span class="badge badge-n">Paused</span>'}</td>
            <td style="display:flex;gap:5px">
              <button class="btn btn-sm btn-ghost" onclick="toggleAlert('${a.id}')">${a.active?'Pause':'Resume'}</button>
              <button class="btn btn-sm btn-danger" onclick="delAlert('${a.id}')">Del</button>
            </td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>`}
    </div>`;
    window.toggleAlert=async id=>{const a=S.alerts.find(x=>x.id===id);if(a){a.active=!a.active;await saveUserData();render();}};
    window.delAlert=async id=>{if(!confirm('Delete alert?'))return;S.alerts=S.alerts.filter(x=>x.id!==id);await saveUserData();render();toast('Alert deleted');};
  }
  render();
};
window.createAlertMdl=()=>showModal('Create Alert',`
  <div class="form-grp"><label class="form-lbl">Symbol</label>
    <input class="form-inp" id="alSym" placeholder="e.g. RELIANCE" list="alSymList">
    <datalist id="alSymList">${S.symbols.slice(0,200).map(s=>`<option value="${s}">`).join('')}</datalist></div>
  <div class="form-row">
    <div class="form-grp"><label class="form-lbl">Condition</label>
      <select class="form-inp" id="alCond"><option value="above">Price goes above</option><option value="below">Price goes below</option></select></div>
    <div class="form-grp"><label class="form-lbl">Target Price (Rs)</label>
      <input class="form-inp" id="alTarget" type="number" step="0.01" placeholder="0.00"></div>
  </div>`,
  `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" onclick="doCreateAlert()">Create</button>`);
window.doCreateAlert=async()=>{
  const sym=(document.getElementById('alSym')?.value||'').trim().toUpperCase();
  const target=parseFloat(document.getElementById('alTarget')?.value);
  if(!sym)return toast('Enter a symbol','err');if(isNaN(target)||target<=0)return toast('Enter valid price','err');
  S.alerts.push({id:'al'+uid(),sym,cond:document.getElementById('alCond')?.value||'above',target,active:true,createdAt:new Date().toISOString()});
  await saveUserData();closeModal();toast(`Alert set for ${sym}`);if(S.activePage==='alerts')nav('alerts');
};

// Auto alert check every minute
setInterval(()=>{
  S.alerts.filter(a=>a.active).forEach(a=>{
    const cur=latestPrice(a.sym);if(!cur)return;
    const trig=(a.cond==='above'&&cur>=a.target)||(a.cond==='below'&&cur<=a.target);
    if(trig&&!a._notified){a._notified=true;toast(`Alert: ${a.sym} is ${a.cond} Rs ${a.target.toFixed(2)} (now ${fp(cur)})`);}
    if(!trig)a._notified=false;
  });
},60000);

(async()=>{
  setLoad(20);

  // 1. Try to load from localStorage cache first (Stale-While-Revalidate)
  let hasCache = false;
  try {
    const cached = localStorage.getItem('marketai_cache');
    if (cached) {
      const parsed = JSON.parse(cached);
      if (parsed.symbols && parsed.symbols.length > 0) {
        mergeData(parsed);
        hasCache = true;
        setLoad(40);
        if (S.lastSync) setSyncState('ok', `Cached · ${S.snapshots.length} snaps · ${fago(S.lastSync)}`);
        renderTicker();
        renderSidebar();
        nav('dashboard');
      }
    }
  } catch (e) {
    console.warn('Error loading cache:', e);
  }

  // 2. Fetch fresh data from API in background
  try {
    const d = await fetchData();
    mergeData(d);
    setLoad(80);
    if (S.lastSync) setSyncState('ok', `Loaded · ${S.snapshots.length} snaps · ${fago(S.lastSync)}`);
    renderTicker();
    renderSidebar();

    if (!hasCache) {
      nav('dashboard');
    } else {
      renderAll();
    }
    setLoad(100);
    setTimeout(() => setLoad(0), 600);

    // Auto-sync on open if stale (>10 min) or no data
    const stale = !S.lastSync || Date.now() - S.lastSync > 10 * 60 * 1000;
    if (stale) {
      setTimeout(() => doSync(S.snapshots.length > 0), 1200);
    }
  } catch (e) {
    console.error('Error fetching fresh data:', e);
    setSyncState(hasCache ? 'ok' : 'err', hasCache ? `Offline/Cached · ${fago(S.lastSync)}` : 'Load failed');
    toast('Fresh data load failed: ' + e.message, 'err');
    setLoad(0);
    if (!hasCache) nav('dashboard');
  }
})();
</script>
